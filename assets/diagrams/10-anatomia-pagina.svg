<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-10" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg10)"/>

  <!-- HEADER -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 3  ·  INFOGRAFICA 10  ·  POSTER</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Anatomia di una pagina web</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">I cinque macro-blocchi presenti in ogni sito moderno — dalla home di Amazon a un blog.</text>

  <!-- CONTENUTO y>=200 -->

  <!-- MOCKUP DI PAGINA — wireframe colorato con annotazioni numerate -->
  <g transform="translate(80, 215)" filter="url(#soft-shadow-10)">
    <!-- Page outer -->
    <rect x="0" y="0" width="780" height="500" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 1. HEADER -->
    <rect x="0" y="0" width="780" height="60" rx="16" fill="#EFF6FF"/>
    <rect x="0" y="40" width="780" height="20" fill="#EFF6FF"/>
    <!-- logo -->
    <rect x="20" y="22" width="60" height="18" rx="3" fill="#2563EB"/>
    <text x="50" y="35" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">LOGO</text>
    <!-- nav links -->
    <rect x="280" y="26" width="50" height="10" rx="2" fill="#93C5FD"/>
    <rect x="340" y="26" width="50" height="10" rx="2" fill="#93C5FD"/>
    <rect x="400" y="26" width="50" height="10" rx="2" fill="#93C5FD"/>
    <rect x="460" y="26" width="50" height="10" rx="2" fill="#93C5FD"/>
    <!-- CTA -->
    <rect x="690" y="20" width="70" height="22" rx="6" fill="#2563EB"/>

    <!-- Annotation: HEADER -->
    <circle cx="-30" cy="30" r="14" fill="#2563EB"/>
    <text x="-30" y="34" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>

    <!-- 2. NAV (sub-bar) -->
    <rect x="0" y="60" width="780" height="32" fill="#F9FAFB"/>
    <rect x="20" y="73" width="40" height="6" rx="1" fill="#9CA3AF"/>
    <rect x="70" y="73" width="80" height="6" rx="1" fill="#9CA3AF"/>
    <rect x="160" y="73" width="60" height="6" rx="1" fill="#9CA3AF"/>
    <rect x="230" y="73" width="50" height="6" rx="1" fill="#9CA3AF"/>

    <!-- Annotation: NAV -->
    <circle cx="-30" cy="76" r="14" fill="#FBBF24"/>
    <text x="-30" y="80" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>

    <!-- 3. SIDEBAR + 4. MAIN CONTENT -->
    <!-- Sidebar -->
    <rect x="0" y="92" width="180" height="368" fill="#FFFBEB"/>
    <rect x="20" y="110" width="60" height="8" rx="1" fill="#FBBF24"/>
    <rect x="20" y="130" width="140" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="146" width="120" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="162" width="100" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="190" width="60" height="8" rx="1" fill="#FBBF24"/>
    <rect x="20" y="210" width="130" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="226" width="110" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="254" width="60" height="8" rx="1" fill="#FBBF24"/>
    <rect x="20" y="274" width="120" height="6" rx="1" fill="#D1D5DB"/>

    <!-- Annotation: SIDEBAR -->
    <circle cx="-30" cy="276" r="14" fill="#D97706"/>
    <text x="-30" y="280" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>

    <!-- Main content area -->
    <rect x="180" y="92" width="600" height="368" fill="#FFFFFF"/>
    <!-- breadcrumb -->
    <rect x="200" y="105" width="200" height="8" rx="1" fill="#D1D5DB"/>
    <!-- h1 -->
    <rect x="200" y="125" width="380" height="20" rx="2" fill="#0F1419"/>
    <!-- subtitle -->
    <rect x="200" y="155" width="500" height="8" rx="1" fill="#9CA3AF"/>
    <!-- card grid 3x2 -->
    <g>
      <rect x="200" y="185" width="170" height="120" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/>
      <rect x="210" y="195" width="150" height="60" rx="3" fill="#D1D5DB"/>
      <rect x="210" y="262" width="100" height="6" rx="1" fill="#0F1419"/>
      <rect x="210" y="275" width="80" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="210" y="286" width="40" height="14" rx="3" fill="#2563EB"/>

      <rect x="385" y="185" width="170" height="120" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/>
      <rect x="395" y="195" width="150" height="60" rx="3" fill="#D1D5DB"/>
      <rect x="395" y="262" width="100" height="6" rx="1" fill="#0F1419"/>
      <rect x="395" y="275" width="80" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="395" y="286" width="40" height="14" rx="3" fill="#2563EB"/>

      <rect x="570" y="185" width="170" height="120" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/>
      <rect x="580" y="195" width="150" height="60" rx="3" fill="#D1D5DB"/>
      <rect x="580" y="262" width="100" height="6" rx="1" fill="#0F1419"/>
      <rect x="580" y="275" width="80" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="580" y="286" width="40" height="14" rx="3" fill="#2563EB"/>
    </g>
    <!-- pagination -->
    <rect x="320" y="335" width="20" height="20" rx="3" fill="#0F1419"/>
    <rect x="345" y="335" width="20" height="20" rx="3" fill="#F3F4F6"/>
    <rect x="370" y="335" width="20" height="20" rx="3" fill="#F3F4F6"/>
    <rect x="395" y="335" width="20" height="20" rx="3" fill="#F3F4F6"/>
    <rect x="420" y="335" width="20" height="20" rx="3" fill="#F3F4F6"/>

    <!-- Annotation: MAIN -->
    <circle cx="850" cy="270" r="14" fill="#0D9488"/>
    <text x="850" y="274" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>

    <!-- 5. FOOTER -->
    <rect x="0" y="460" width="780" height="40" rx="0" fill="#0F1419"/>
    <rect x="0" y="484" width="780" height="16" rx="16" fill="#0F1419"/>
    <rect x="20" y="475" width="80" height="6" rx="1" fill="#6B7280"/>
    <rect x="120" y="475" width="80" height="6" rx="1" fill="#6B7280"/>
    <rect x="220" y="475" width="80" height="6" rx="1" fill="#6B7280"/>
    <rect x="700" y="475" width="60" height="6" rx="1" fill="#6B7280"/>

    <!-- Annotation: FOOTER -->
    <circle cx="850" cy="480" r="14" fill="#BE123C"/>
    <text x="850" y="484" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  </g>

  <!-- Legend on the right -->
  <g transform="translate(900, 215)">
    <text x="0" y="20" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">LEGENDA</text>

    <!-- 1 -->
    <circle cx="14" cy="56" r="14" fill="#2563EB"/>
    <text x="14" y="60" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="38" y="52" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Header</text>
    <text x="38" y="68" font-size="11" fill="#6B7280">logo · nav · CTA · search</text>

    <!-- 2 -->
    <circle cx="14" cy="106" r="14" fill="#FBBF24"/>
    <text x="14" y="110" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="38" y="102" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Nav</text>
    <text x="38" y="118" font-size="11" fill="#6B7280">link principali del sito</text>

    <!-- 3 -->
    <circle cx="14" cy="156" r="14" fill="#D97706"/>
    <text x="14" y="160" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="38" y="152" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Sidebar</text>
    <text x="38" y="168" font-size="11" fill="#6B7280">filtri · indice · profilo</text>
    <text x="38" y="183" font-size="10" fill="#9CA3AF" font-style="italic">opzionale</text>

    <!-- 4 -->
    <circle cx="14" cy="220" r="14" fill="#0D9488"/>
    <text x="14" y="224" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="38" y="216" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Main content</text>
    <text x="38" y="232" font-size="11" fill="#6B7280">il cuore della pagina</text>

    <!-- 5 -->
    <circle cx="14" cy="270" r="14" fill="#BE123C"/>
    <text x="14" y="274" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
    <text x="38" y="266" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Footer</text>
    <text x="38" y="282" font-size="11" fill="#6B7280">link legali · social · ©</text>

    <!-- Mobile note -->
    <line x1="0" y1="320" x2="240" y2="320" stroke="#E5E7EB"/>
    <text x="0" y="345" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="1.5">SU MOBILE</text>
    <text x="0" y="370" font-size="12" fill="#0F1419">Header collassa in</text>
    <text x="0" y="386" font-size="12" fill="#0F1419">hamburger menu (☰).</text>
    <text x="0" y="408" font-size="12" fill="#0F1419">Sidebar diventa drawer</text>
    <text x="0" y="424" font-size="12" fill="#0F1419">apribile dal lato.</text>
    <text x="0" y="446" font-size="12" fill="#0F1419">Grid passa a 1 colonna.</text>
  </g>

  <!-- Bottom call-to-print -->
  <g transform="translate(80, 740)">
    <text x="0" y="0" font-size="13" fill="#0F1419" letter-spacing="-0.1">
      <tspan font-weight="700">Suggerimento:</tspan>
      <tspan fill="#6B7280"> stampa questa pagina formato A2 e tienila accanto al PC. Quando descrivi a Claude, parti da qui.</tspan>
    </text>
  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  10/16</text>
</svg>
