<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-10" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg10)"/>

  <!-- HEADER -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 3  ·  INFOGRAFICA 10  ·  POSTER</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Anatomia di una pagina web</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">I cinque macro-blocchi presenti in ogni sito moderno — dalla home di Amazon a un blog.</text>

  <!-- CONTENUTO y>=200 -->

  <!-- LEADER LINES (tratteggiate, dietro al mockup) -->
  <!-- 1 Header line -->
  <line x1="180" y1="245" x2="225" y2="245" stroke="#2563EB" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <!-- 2 Nav line -->
  <line x1="180" y1="305" x2="225" y2="305" stroke="#FBBF24" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <!-- 3 Sidebar line -->
  <line x1="180" y1="450" x2="240" y2="450" stroke="#D97706" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- 4 Main content line (right side of mockup) -->
  <line x1="780" y1="450" x2="830" y2="450" stroke="#0D9488" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- 5 Footer line (right side, lower) -->
  <line x1="780" y1="638" x2="830" y2="638" stroke="#BE123C" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- ===== MOCKUP DI PAGINA ===== -->
  <g transform="translate(225, 215)" filter="url(#soft-shadow-10)">
    <rect x="0" y="0" width="555" height="450" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <!-- 1. HEADER (y=0..60) -->
    <rect x="0" y="0" width="555" height="60" rx="14" fill="#EFF6FF"/>
    <rect x="0" y="40" width="555" height="20" fill="#EFF6FF"/>
    <rect x="20" y="22" width="60" height="18" rx="3" fill="#2563EB"/>
    <text x="50" y="35" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">LOGO</text>
    <rect x="200" y="26" width="40" height="10" rx="2" fill="#93C5FD"/>
    <rect x="250" y="26" width="40" height="10" rx="2" fill="#93C5FD"/>
    <rect x="300" y="26" width="40" height="10" rx="2" fill="#93C5FD"/>
    <rect x="350" y="26" width="40" height="10" rx="2" fill="#93C5FD"/>
    <rect x="475" y="20" width="60" height="22" rx="6" fill="#2563EB"/>

    <!-- 2. NAV (y=60..90) -->
    <rect x="0" y="60" width="555" height="30" fill="#F9FAFB"/>
    <rect x="20" y="73" width="40" height="6" rx="1" fill="#9CA3AF"/>
    <rect x="70" y="73" width="80" height="6" rx="1" fill="#9CA3AF"/>
    <rect x="160" y="73" width="60" height="6" rx="1" fill="#9CA3AF"/>
    <rect x="230" y="73" width="50" height="6" rx="1" fill="#9CA3AF"/>

    <!-- 3+4 SIDEBAR + MAIN (y=90..410) -->
    <rect x="0" y="90" width="140" height="320" fill="#FFFBEB"/>
    <rect x="20" y="110" width="60" height="8" rx="1" fill="#FBBF24"/>
    <rect x="20" y="130" width="100" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="146" width="80" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="162" width="90" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="190" width="60" height="8" rx="1" fill="#FBBF24"/>
    <rect x="20" y="210" width="90" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="226" width="80" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="242" width="100" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="270" width="60" height="8" rx="1" fill="#FBBF24"/>
    <rect x="20" y="290" width="80" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="306" width="90" height="6" rx="1" fill="#D1D5DB"/>

    <!-- Main -->
    <rect x="140" y="90" width="415" height="320" fill="#FFFFFF"/>
    <rect x="160" y="105" width="200" height="8" rx="1" fill="#D1D5DB"/>
    <rect x="160" y="125" width="280" height="20" rx="2" fill="#0F1419"/>
    <rect x="160" y="155" width="370" height="8" rx="1" fill="#9CA3AF"/>

    <!-- Card grid 3 cards -->
    <g>
      <rect x="160" y="185" width="115" height="100" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/>
      <rect x="170" y="195" width="95" height="48" rx="3" fill="#D1D5DB"/>
      <rect x="170" y="252" width="80" height="6" rx="1" fill="#0F1419"/>
      <rect x="170" y="264" width="60" height="4" rx="1" fill="#9CA3AF"/>
      <rect x="170" y="274" width="30" height="8" rx="2" fill="#2563EB"/>

      <rect x="285" y="185" width="115" height="100" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/>
      <rect x="295" y="195" width="95" height="48" rx="3" fill="#D1D5DB"/>
      <rect x="295" y="252" width="80" height="6" rx="1" fill="#0F1419"/>
      <rect x="295" y="264" width="60" height="4" rx="1" fill="#9CA3AF"/>
      <rect x="295" y="274" width="30" height="8" rx="2" fill="#2563EB"/>

      <rect x="410" y="185" width="115" height="100" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/>
      <rect x="420" y="195" width="95" height="48" rx="3" fill="#D1D5DB"/>
      <rect x="420" y="252" width="80" height="6" rx="1" fill="#0F1419"/>
      <rect x="420" y="264" width="60" height="4" rx="1" fill="#9CA3AF"/>
      <rect x="420" y="274" width="30" height="8" rx="2" fill="#2563EB"/>
    </g>

    <!-- Pagination -->
    <rect x="290" y="305" width="20" height="20" rx="3" fill="#0F1419"/>
    <rect x="315" y="305" width="20" height="20" rx="3" fill="#F3F4F6"/>
    <rect x="340" y="305" width="20" height="20" rx="3" fill="#F3F4F6"/>
    <rect x="365" y="305" width="20" height="20" rx="3" fill="#F3F4F6"/>

    <!-- Continued sidebar background -->
    <rect x="0" y="320" width="140" height="90" fill="#FFFBEB"/>
    <rect x="20" y="335" width="100" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="350" width="80" height="6" rx="1" fill="#D1D5DB"/>
    <rect x="20" y="365" width="70" height="6" rx="1" fill="#D1D5DB"/>

    <!-- 5. FOOTER (y=410..450) -->
    <rect x="0" y="410" width="555" height="40" fill="#0F1419"/>
    <rect x="0" y="436" width="555" height="14" rx="14" fill="#0F1419"/>
    <rect x="20" y="425" width="80" height="6" rx="1" fill="#6B7280"/>
    <rect x="120" y="425" width="80" height="6" rx="1" fill="#6B7280"/>
    <rect x="220" y="425" width="80" height="6" rx="1" fill="#6B7280"/>
    <rect x="475" y="425" width="60" height="6" rx="1" fill="#6B7280"/>
  </g>

  <!-- ===== ANNOTATION CIRCLES (left of mockup) ===== -->
  <!-- 1 -->
  <circle cx="180" cy="245" r="16" fill="#2563EB" filter="url(#soft-shadow-10)"/>
  <text x="180" y="250" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>

  <!-- 2 -->
  <circle cx="180" cy="305" r="16" fill="#FBBF24" filter="url(#soft-shadow-10)"/>
  <text x="180" y="310" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>

  <!-- 3 -->
  <circle cx="180" cy="450" r="16" fill="#D97706" filter="url(#soft-shadow-10)"/>
  <text x="180" y="455" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>

  <!-- 4 (right of mockup) -->
  <circle cx="830" cy="450" r="16" fill="#0D9488" filter="url(#soft-shadow-10)"/>
  <text x="830" y="455" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>

  <!-- 5 (right of mockup, footer) -->
  <circle cx="830" cy="638" r="16" fill="#BE123C" filter="url(#soft-shadow-10)"/>
  <text x="830" y="643" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>

  <!-- ===== LEGEND (right side) — spaziatura uniforme 60px ===== -->
  <g transform="translate(880, 215)">
    <text x="0" y="20" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">LEGENDA</text>

    <!-- 1 Header -->
    <circle cx="14" cy="56" r="14" fill="#2563EB"/>
    <text x="14" y="60" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="38" y="52" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Header</text>
    <text x="38" y="68" font-size="11" fill="#6B7280">logo · nav · CTA · search</text>

    <!-- 2 Nav -->
    <circle cx="14" cy="116" r="14" fill="#FBBF24"/>
    <text x="14" y="120" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="38" y="112" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Nav</text>
    <text x="38" y="128" font-size="11" fill="#6B7280">link principali del sito</text>

    <!-- 3 Sidebar -->
    <circle cx="14" cy="176" r="14" fill="#D97706"/>
    <text x="14" y="180" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="38" y="172" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Sidebar <tspan font-size="10" fill="#9CA3AF" font-style="italic" font-weight="400">opzionale</tspan></text>
    <text x="38" y="188" font-size="11" fill="#6B7280">filtri · indice · profilo</text>

    <!-- 4 Main content -->
    <circle cx="14" cy="236" r="14" fill="#0D9488"/>
    <text x="14" y="240" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="38" y="232" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Main content</text>
    <text x="38" y="248" font-size="11" fill="#6B7280">il cuore della pagina</text>

    <!-- 5 Footer -->
    <circle cx="14" cy="296" r="14" fill="#BE123C"/>
    <text x="14" y="300" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
    <text x="38" y="292" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.2">Footer</text>
    <text x="38" y="308" font-size="11" fill="#6B7280">link legali · social · ©</text>

    <!-- Mobile note -->
    <line x1="0" y1="345" x2="240" y2="345" stroke="#E5E7EB"/>
    <text x="0" y="370" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="1.5">SU MOBILE</text>
    <text x="0" y="392" font-size="12" fill="#0F1419">Header collassa in</text>
    <text x="0" y="408" font-size="12" fill="#0F1419">hamburger menu (☰).</text>
    <text x="0" y="430" font-size="12" fill="#0F1419">Sidebar diventa drawer</text>
    <text x="0" y="446" font-size="12" fill="#0F1419">apribile dal lato.</text>
  </g>

  <!-- Bottom suggestion -->
  <g transform="translate(80, 740)">
    <text x="0" y="0" font-size="13" fill="#0F1419" letter-spacing="-0.1">
      <tspan font-weight="700">Suggerimento:</tspan>
      <tspan fill="#6B7280"> stampa questa pagina formato A2 e tienila accanto al PC. Quando descrivi a Claude, parti da qui.</tspan>
    </text>
  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  10/16</text>
</svg>
