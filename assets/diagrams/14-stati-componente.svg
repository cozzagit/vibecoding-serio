<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-14" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg14)"/>

  <!-- HEADER -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 3  ·  INFOGRAFICA 14</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Stati di un componente</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Lo stesso bottone è <tspan font-weight="600" fill="#0F1419">8 cose diverse</tspan> a seconda del contesto. Curarli tutti = interfaccia professionale.</text>

  <!-- CONTENUTO y>=200 -->

  <!-- BUTTON STATES (8 in 4x2 grid) -->
  <g transform="translate(80, 215)" filter="url(#soft-shadow-14)">
    <rect x="0" y="0" width="1040" height="290" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="32" y="36" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">GLI 8 STATI DI UN BOTTONE</text>

    <!-- Row 1 -->
    <!-- 1. Idle -->
    <g transform="translate(40, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="1.5">01  IDLE</text>
      <rect x="0" y="14" width="200" height="44" rx="6" fill="#0F1419"/>
      <text x="100" y="42" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Salva</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">stato neutro, nessuna interazione</text>
    </g>

    <!-- 2. Hover -->
    <g transform="translate(280, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="1.5">02  HOVER</text>
      <rect x="0" y="14" width="200" height="44" rx="6" fill="#1F2937"/>
      <text x="100" y="42" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Salva</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">cursore sopra: cambia tono</text>
    </g>

    <!-- 3. Focus -->
    <g transform="translate(520, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="1.5">03  FOCUS</text>
      <rect x="-3" y="11" width="206" height="50" rx="9" fill="none" stroke="#2563EB" stroke-width="3"/>
      <rect x="0" y="14" width="200" height="44" rx="6" fill="#0F1419"/>
      <text x="100" y="42" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Salva</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">selezionato da tastiera (TAB)</text>
    </g>

    <!-- 4. Active -->
    <g transform="translate(760, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="1.5">04  ACTIVE</text>
      <rect x="0" y="16" width="200" height="40" rx="6" fill="#374151"/>
      <text x="100" y="42" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Salva</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">premuto in questo istante</text>
    </g>

    <!-- Row 2 -->
    <!-- 5. Disabled -->
    <g transform="translate(40, 175)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="1.5">05  DISABLED</text>
      <rect x="0" y="14" width="200" height="44" rx="6" fill="#E5E7EB"/>
      <text x="100" y="42" font-size="14" font-weight="600" fill="#9CA3AF" text-anchor="middle">Salva</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">grigio, non cliccabile</text>
    </g>

    <!-- 6. Loading -->
    <g transform="translate(280, 175)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#D97706" letter-spacing="1.5">06  LOADING</text>
      <rect x="0" y="14" width="200" height="44" rx="6" fill="#0F1419"/>
      <!-- spinner -->
      <circle cx="80" cy="36" r="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
      <path d="M 88,36 A 8,8 0 0,1 80,44" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      <text x="120" y="41" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Salvataggio…</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">azione in corso, spinner visibile</text>
    </g>

    <!-- 7. Success -->
    <g transform="translate(520, 175)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="1.5">07  SUCCESS</text>
      <rect x="0" y="14" width="200" height="44" rx="6" fill="#0D9488"/>
      <text x="86" y="41" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">✓ Salvato</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">azione riuscita, feedback verde</text>
    </g>

    <!-- 8. Error -->
    <g transform="translate(760, 175)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#BE123C" letter-spacing="1.5">08  ERROR</text>
      <rect x="0" y="14" width="200" height="44" rx="6" fill="#FFFFFF" stroke="#BE123C" stroke-width="2"/>
      <text x="100" y="42" font-size="14" font-weight="600" fill="#BE123C" text-anchor="middle">✕ Errore</text>
      <text x="0" y="80" font-size="11" fill="#9CA3AF">azione fallita, feedback rosso</text>
    </g>
  </g>

  <!-- PAGE-LEVEL STATES -->
  <g transform="translate(80, 535)" filter="url(#soft-shadow-14)">
    <rect x="0" y="0" width="1040" height="200" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="32" y="36" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">A LIVELLO DI PAGINA  ·  STATI DI UNA LISTA</text>

    <!-- Empty state -->
    <g transform="translate(40, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#0F1419" letter-spacing="1.5">EMPTY</text>
      <rect x="0" y="14" width="220" height="100" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-dasharray="3 3"/>
      <circle cx="110" cy="50" r="14" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
      <line x1="103" y1="50" x2="117" y2="50" stroke="#9CA3AF" stroke-width="1.5"/>
      <rect x="65" y="76" width="90" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="80" y="92" width="60" height="14" rx="3" fill="#0F1419"/>
      <text x="0" y="135" font-size="11" fill="#6B7280">Nessun elemento + CTA</text>
    </g>

    <!-- Loading state -->
    <g transform="translate(290, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#0F1419" letter-spacing="1.5">LOADING (skeleton)</text>
      <rect x="0" y="14" width="220" height="100" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="14" y="28" width="190" height="14" rx="3" fill="#F3F4F6"/>
      <rect x="14" y="50" width="160" height="10" rx="2" fill="#F3F4F6"/>
      <rect x="14" y="68" width="180" height="10" rx="2" fill="#F3F4F6"/>
      <rect x="14" y="86" width="140" height="10" rx="2" fill="#F3F4F6"/>
      <text x="0" y="135" font-size="11" fill="#6B7280">Placeholder grigio durante fetch</text>
    </g>

    <!-- Error state -->
    <g transform="translate(540, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#0F1419" letter-spacing="1.5">ERROR</text>
      <rect x="0" y="14" width="220" height="100" rx="8" fill="#FEF2F2" stroke="#FCA5A5"/>
      <circle cx="110" cy="48" r="14" fill="none" stroke="#BE123C" stroke-width="1.5"/>
      <line x1="110" y1="42" x2="110" y2="50" stroke="#BE123C" stroke-width="2"/>
      <circle cx="110" cy="55" r="1" fill="#BE123C"/>
      <rect x="55" y="76" width="110" height="6" rx="1" fill="#991B1B"/>
      <rect x="80" y="92" width="60" height="14" rx="3" fill="#BE123C"/>
      <text x="0" y="135" font-size="11" fill="#6B7280">Cosa è successo + Riprova</text>
    </g>

    <!-- Success state -->
    <g transform="translate(790, 60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#0F1419" letter-spacing="1.5">SUCCESS</text>
      <rect x="0" y="14" width="220" height="100" rx="8" fill="#F0FDF4" stroke="#86EFAC"/>
      <circle cx="110" cy="50" r="16" fill="#0D9488"/>
      <text x="110" y="56" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
      <rect x="55" y="80" width="110" height="6" rx="1" fill="#065F46"/>
      <rect x="70" y="93" width="80" height="4" rx="1" fill="#065F46" opacity="0.6"/>
      <text x="0" y="135" font-size="11" fill="#6B7280">Conferma + prossimo step</text>
    </g>
  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  14/16</text>
</svg>
