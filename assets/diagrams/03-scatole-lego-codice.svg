<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg3)"/>

  <!-- Header -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 0  ·  INFOGRAFICA 03</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Le scatole di Lego del codice</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Pacchetto · Libreria · Framework · API · SDK — i 5 termini che Claude usa cento volte al giorno.</text>

  <!-- 5 cards -->
  <g transform="translate(80, 210)">

    <!-- 1. PACCHETTO -->
    <g transform="translate(0, 0)" filter="url(#soft-shadow-3)">
      <rect x="0" y="0" width="200" height="290" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="2">01</text>

      <!-- Icon: package box -->
      <g transform="translate(100, 100)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M -28,-12 L 0,-26 L 28,-12 L 28,16 L 0,30 L -28,16 Z"/>
        <line x1="-28" y1="-12" x2="0" y2="2"/>
        <line x1="28" y1="-12" x2="0" y2="2"/>
        <line x1="0" y1="2" x2="0" y2="30"/>
        <line x1="-14" y1="-19" x2="14" y2="-5" stroke="#9CA3AF"/>
      </g>

      <text x="100" y="170" font-size="18" font-weight="700" fill="#0F1419" text-anchor="middle" letter-spacing="-0.3">Pacchetto</text>
      <text x="100" y="190" font-size="12" fill="#6B7280" font-style="italic" text-anchor="middle">"la bottiglia chiusa"</text>

      <line x1="20" y1="210" x2="180" y2="210" stroke="#E5E7EB"/>
      <text x="100" y="234" font-size="12" fill="#0F1419" text-anchor="middle">Il file zippato che</text>
      <text x="100" y="250" font-size="12" fill="#0F1419" text-anchor="middle">scarichi da npm/pip</text>

      <rect x="20" y="262" width="160" height="20" rx="4" fill="#F3F4F6"/>
      <text x="100" y="276" font-size="11" font-family="'JetBrains Mono', monospace" fill="#0F1419" text-anchor="middle">npm install axios</text>
    </g>

    <!-- 2. LIBRERIA -->
    <g transform="translate(220, 0)" filter="url(#soft-shadow-3)">
      <rect x="0" y="0" width="200" height="290" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">02</text>

      <!-- Icon: puzzle piece -->
      <g transform="translate(100, 100)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M -22,-10 L -10,-10 Q -10,-18 -2,-18 Q 6,-18 6,-10 L 22,-10 L 22,2 Q 14,2 14,10 Q 14,18 22,18 L 22,22 L -22,22 L -22,10 Q -14,10 -14,2 Q -14,-6 -22,-6 Z"/>
      </g>

      <text x="100" y="170" font-size="18" font-weight="700" fill="#0F1419" text-anchor="middle" letter-spacing="-0.3">Libreria</text>
      <text x="100" y="190" font-size="12" fill="#6B7280" font-style="italic" text-anchor="middle">"la ricetta"</text>

      <line x1="20" y1="210" x2="180" y2="210" stroke="#E5E7EB"/>
      <text x="100" y="234" font-size="12" fill="#0F1419" text-anchor="middle">Codice riusabile per</text>
      <text x="100" y="250" font-size="12" fill="#0F1419" text-anchor="middle">UNA cosa specifica</text>

      <rect x="20" y="262" width="160" height="20" rx="4" fill="#EFF6FF"/>
      <text x="100" y="276" font-size="11" font-family="'JetBrains Mono', monospace" fill="#2563EB" text-anchor="middle">axios · dayjs · lodash</text>
    </g>

    <!-- 3. FRAMEWORK -->
    <g transform="translate(440, 0)" filter="url(#soft-shadow-3)">
      <rect x="0" y="0" width="200" height="290" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#D97706" letter-spacing="2">03</text>

      <!-- Icon: scaffolding/grid -->
      <g transform="translate(100, 100)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-26" y="-22" width="52" height="44"/>
        <line x1="-26" y1="-8" x2="26" y2="-8"/>
        <line x1="-26" y1="8" x2="26" y2="8"/>
        <line x1="-9" y1="-22" x2="-9" y2="22"/>
        <line x1="9" y1="-22" x2="9" y2="22"/>
        <rect x="-7" y="-6" width="14" height="12" fill="#FED7AA" stroke="none"/>
      </g>

      <text x="100" y="170" font-size="18" font-weight="700" fill="#0F1419" text-anchor="middle" letter-spacing="-0.3">Framework</text>
      <text x="100" y="190" font-size="12" fill="#6B7280" font-style="italic" text-anchor="middle">"la cucina attrezzata"</text>

      <line x1="20" y1="210" x2="180" y2="210" stroke="#E5E7EB"/>
      <text x="100" y="234" font-size="12" fill="#0F1419" text-anchor="middle">Codice + struttura</text>
      <text x="100" y="250" font-size="12" fill="#0F1419" text-anchor="middle">imposta al progetto</text>

      <rect x="20" y="262" width="160" height="20" rx="4" fill="#FEF3C7"/>
      <text x="100" y="276" font-size="11" font-family="'JetBrains Mono', monospace" fill="#D97706" text-anchor="middle">Next · Laravel · Django</text>
    </g>

    <!-- 4. API -->
    <g transform="translate(660, 0)" filter="url(#soft-shadow-3)">
      <rect x="0" y="0" width="200" height="290" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">04</text>

      <!-- Icon: connector/plug -->
      <g transform="translate(100, 100)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-26" y="-8" width="22" height="16" rx="2"/>
        <line x1="-30" y1="-3" x2="-26" y2="-3"/>
        <line x1="-30" y1="3" x2="-26" y2="3"/>
        <line x1="-4" y1="0" x2="6" y2="0"/>
        <circle cx="14" cy="0" r="8"/>
        <line x1="22" y1="0" x2="30" y2="0"/>
        <circle cx="14" cy="0" r="3" fill="#0D9488" stroke="none"/>
      </g>

      <text x="100" y="170" font-size="18" font-weight="700" fill="#0F1419" text-anchor="middle" letter-spacing="-0.3">API</text>
      <text x="100" y="190" font-size="12" fill="#6B7280" font-style="italic" text-anchor="middle">"il menu del ristorante"</text>

      <line x1="20" y1="210" x2="180" y2="210" stroke="#E5E7EB"/>
      <text x="100" y="234" font-size="12" fill="#0F1419" text-anchor="middle">Lista di cose richiedibili</text>
      <text x="100" y="250" font-size="12" fill="#0F1419" text-anchor="middle">a un servizio</text>

      <rect x="20" y="262" width="160" height="20" rx="4" fill="#CCFBF1"/>
      <text x="100" y="276" font-size="11" font-family="'JetBrains Mono', monospace" fill="#0D9488" text-anchor="middle">OpenAI · Stripe · Maps</text>
    </g>

    <!-- 5. SDK -->
    <g transform="translate(880, 0)" filter="url(#soft-shadow-3)">
      <rect x="0" y="0" width="200" height="290" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="2">05</text>

      <!-- Icon: toolkit/briefcase -->
      <g transform="translate(100, 100)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-26" y="-12" width="52" height="32" rx="3"/>
        <path d="M -10,-12 L -10,-20 L 10,-20 L 10,-12"/>
        <line x1="-26" y1="-2" x2="26" y2="-2" stroke-dasharray="2 2"/>
        <rect x="-3" y="-5" width="6" height="6" fill="#7C3AED" stroke="none"/>
      </g>

      <text x="100" y="170" font-size="18" font-weight="700" fill="#0F1419" text-anchor="middle" letter-spacing="-0.3">SDK</text>
      <text x="100" y="190" font-size="12" fill="#6B7280" font-style="italic" text-anchor="middle">"il kit pronto"</text>

      <line x1="20" y1="210" x2="180" y2="210" stroke="#E5E7EB"/>
      <text x="100" y="234" font-size="12" fill="#0F1419" text-anchor="middle">Libreria specializzata</text>
      <text x="100" y="250" font-size="12" fill="#0F1419" text-anchor="middle">per usare un'API</text>

      <rect x="20" y="262" width="160" height="20" rx="4" fill="#EDE9FE"/>
      <text x="100" y="276" font-size="11" font-family="'JetBrains Mono', monospace" fill="#7C3AED" text-anchor="middle">Stripe · Supabase</text>
    </g>

  </g>

  <!-- Code annotated example -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="1040" height="200" rx="14" fill="#0F1419"/>
    <text x="28" y="32" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">CODICE ANNOTATO  ·  TUTTI I 5 TERMINI IN UN ESEMPIO</text>

    <text x="28" y="65" font-size="13" font-family="'JetBrains Mono', monospace" fill="#94A3B8">// aggiungere pagamenti Stripe a un sito Next.js</text>

    <text x="28" y="92" font-size="14" font-family="'JetBrains Mono', monospace" fill="#FFFFFF">npm install stripe</text>
    <text x="540" y="92" font-size="12" font-family="'Inter Tight'" fill="#9CA3AF">→</text>
    <text x="558" y="92" font-size="12" font-family="'Inter Tight'" fill="#FFFFFF">scarichi il </text>
    <text x="624" y="92" font-size="12" font-family="'Inter Tight'" font-weight="700" fill="#9CA3AF">PACCHETTO</text>

    <text x="28" y="118" font-size="14" font-family="'JetBrains Mono', monospace" fill="#60A5FA">import Stripe from 'stripe'</text>
    <text x="540" y="118" font-size="12" font-family="'Inter Tight'" fill="#9CA3AF">→</text>
    <text x="558" y="118" font-size="12" font-family="'Inter Tight'" fill="#FFFFFF">importi la </text>
    <text x="623" y="118" font-size="12" font-family="'Inter Tight'" font-weight="700" fill="#60A5FA">LIBRERIA / SDK</text>

    <text x="28" y="144" font-size="14" font-family="'JetBrains Mono', monospace" fill="#A78BFA">const stripe = new Stripe(API_KEY)</text>
    <text x="540" y="144" font-size="12" font-family="'Inter Tight'" fill="#9CA3AF">→</text>
    <text x="558" y="144" font-size="12" font-family="'Inter Tight'" fill="#FFFFFF">inizializzi l'</text>
    <text x="635" y="144" font-size="12" font-family="'Inter Tight'" font-weight="700" fill="#A78BFA">SDK</text>

    <text x="28" y="170" font-size="14" font-family="'JetBrains Mono', monospace" fill="#5EEAD4">stripe.charges.create({ amount: 2900 })</text>
    <text x="540" y="170" font-size="12" font-family="'Inter Tight'" fill="#9CA3AF">→</text>
    <text x="558" y="170" font-size="12" font-family="'Inter Tight'" fill="#FFFFFF">chiami l'</text>
    <text x="615" y="170" font-size="12" font-family="'Inter Tight'" font-weight="700" fill="#5EEAD4">API</text>
    <text x="638" y="170" font-size="12" font-family="'Inter Tight'" fill="#FFFFFF"> di Stripe</text>

    <text x="28" y="190" font-size="11" font-family="'JetBrains Mono', monospace" fill="#FBBF24">// tutto dentro un progetto Next.js (FRAMEWORK)</text>
  </g>

  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  03/16</text>
</svg>
