<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="800" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="60" y="70" font-size="32" font-weight="700" fill="#1A1A1A">Anatomia di un sito online</text>
  <text x="60" y="100" font-size="16" fill="#666">"Ho il server da Aruba" sono in realtà 4 cose diverse</text>

  <!-- Browser at top -->
  <g>
    <rect x="500" y="150" width="200" height="80" rx="10" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
    <text x="600" y="180" font-size="18" font-weight="700" fill="#1A1A1A" text-anchor="middle">🌐 Browser</text>
    <text x="600" y="208" font-size="13" fill="#666" text-anchor="middle">digita "miosito.it"</text>
  </g>

  <!-- Arrow down -->
  <line x1="600" y1="240" x2="600" y2="290" stroke="#1A1A1A" stroke-width="2"/>
  <polygon points="600,290 593,278 607,278" fill="#1A1A1A"/>

  <!-- DOMINIO -->
  <g>
    <rect x="80" y="300" width="260" height="180" rx="14" fill="#FFFFFF" stroke="#5B8AFF" stroke-width="2"/>
    <text x="210" y="335" font-size="20" font-weight="700" fill="#2D5BFF" text-anchor="middle">📛 DOMINIO</text>
    <text x="210" y="365" font-size="14" font-family="JetBrains Mono, monospace" fill="#1A1A1A" text-anchor="middle">miosito.it</text>
    <line x1="100" y1="385" x2="320" y2="385" stroke="#E5E5E0"/>
    <text x="210" y="410" font-size="13" fill="#1A1A1A" text-anchor="middle">Il nome che digiti</text>
    <text x="210" y="430" font-size="13" fill="#1A1A1A" text-anchor="middle">nel browser</text>
    <text x="210" y="460" font-size="11" fill="#999" text-anchor="middle">Si compra annualmente da</text>
    <text x="210" y="475" font-size="11" fill="#999" text-anchor="middle">Namecheap, Aruba, GoDaddy</text>
  </g>

  <!-- DNS -->
  <g>
    <rect x="380" y="300" width="260" height="180" rx="14" fill="#FFFFFF" stroke="#FF7A3D" stroke-width="2"/>
    <text x="510" y="335" font-size="20" font-weight="700" fill="#FF7A3D" text-anchor="middle">📒 DNS</text>
    <text x="510" y="365" font-size="14" font-family="JetBrains Mono, monospace" fill="#1A1A1A" text-anchor="middle">→ 188.213.170.214</text>
    <line x1="400" y1="385" x2="620" y2="385" stroke="#E5E5E0"/>
    <text x="510" y="410" font-size="13" fill="#1A1A1A" text-anchor="middle">L'elenco telefonico</text>
    <text x="510" y="430" font-size="13" fill="#1A1A1A" text-anchor="middle">che traduce nome → IP</text>
    <text x="510" y="460" font-size="11" fill="#999" text-anchor="middle">Sistema mondiale.</text>
    <text x="510" y="475" font-size="11" fill="#999" text-anchor="middle">Configuri i record A, CNAME, MX</text>
  </g>

  <!-- HOSTING -->
  <g>
    <rect x="680" y="300" width="260" height="180" rx="14" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="2"/>
    <text x="810" y="335" font-size="20" font-weight="700" fill="#2A9D8F" text-anchor="middle">🏢 HOSTING</text>
    <text x="810" y="365" font-size="14" font-family="JetBrains Mono, monospace" fill="#1A1A1A" text-anchor="middle">Aruba · Vercel · AWS</text>
    <line x1="700" y1="385" x2="920" y2="385" stroke="#E5E5E0"/>
    <text x="810" y="410" font-size="13" fill="#1A1A1A" text-anchor="middle">Il fornitore</text>
    <text x="810" y="430" font-size="13" fill="#1A1A1A" text-anchor="middle">che ti vende il server</text>
    <text x="810" y="460" font-size="11" fill="#999" text-anchor="middle">VPS, hosting condiviso,</text>
    <text x="810" y="475" font-size="11" fill="#999" text-anchor="middle">PaaS, IaaS</text>
  </g>

  <!-- SERVER -->
  <g>
    <rect x="980" y="300" width="180" height="180" rx="14" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
    <text x="1070" y="335" font-size="20" font-weight="700" fill="#1A1A1A" text-anchor="middle">⚙️ SERVER</text>
    <text x="1070" y="362" font-size="13" font-family="JetBrains Mono, monospace" fill="#666" text-anchor="middle">la macchina</text>
    <line x1="1000" y1="385" x2="1140" y2="385" stroke="#E5E5E0"/>
    <text x="1070" y="410" font-size="13" fill="#1A1A1A" text-anchor="middle">Esegue</text>
    <text x="1070" y="430" font-size="13" fill="#1A1A1A" text-anchor="middle">il tuo codice</text>
    <text x="1070" y="460" font-size="11" fill="#999" text-anchor="middle">Sta in un</text>
    <text x="1070" y="475" font-size="11" fill="#999" text-anchor="middle">data center 24/7</text>
  </g>

  <!-- Connecting flow line bottom -->
  <line x1="210" y1="500" x2="210" y2="550" stroke="#5B8AFF" stroke-width="2"/>
  <line x1="510" y1="500" x2="510" y2="550" stroke="#FF7A3D" stroke-width="2"/>
  <line x1="810" y1="500" x2="810" y2="550" stroke="#2A9D8F" stroke-width="2"/>
  <line x1="1070" y1="500" x2="1070" y2="550" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Process line -->
  <text x="120" y="585" font-size="12" font-weight="700" fill="#5B8AFF">1.</text>
  <text x="145" y="585" font-size="13" fill="#1A1A1A">Compri il nome</text>

  <text x="430" y="585" font-size="12" font-weight="700" fill="#FF7A3D">2.</text>
  <text x="455" y="585" font-size="13" fill="#1A1A1A">Configuri il puntamento</text>

  <text x="720" y="585" font-size="12" font-weight="700" fill="#2A9D8F">3.</text>
  <text x="745" y="585" font-size="13" fill="#1A1A1A">Affitti la macchina</text>

  <text x="1010" y="585" font-size="12" font-weight="700" fill="#1A1A1A">4.</text>
  <text x="1035" y="585" font-size="13" fill="#1A1A1A">Carichi il codice</text>

  <!-- Real example -->
  <rect x="60" y="640" width="1080" height="100" rx="10" fill="#FFFFFF" stroke="#E5E5E0" stroke-dasharray="4 3"/>
  <text x="80" y="670" font-size="13" font-weight="700" fill="#666">ESEMPIO REALE</text>
  <text x="80" y="697" font-size="14" fill="#1A1A1A">Compri</text>
  <text x="135" y="697" font-size="14" font-weight="600" fill="#2D5BFF">miobellosito.it</text>
  <text x="265" y="697" font-size="14" fill="#1A1A1A">su Namecheap (12€/anno) →  affitti VPS Aruba (5€/mese, IP</text>
  <text x="775" y="697" font-size="14" font-family="JetBrains Mono, monospace" fill="#2A9D8F">188.213.170.214</text>
  <text x="950" y="697" font-size="14" fill="#1A1A1A">) →</text>
  <text x="80" y="722" font-size="14" fill="#1A1A1A">configuri record A su Namecheap che dice "</text>
  <text x="430" y="722" font-size="14" font-weight="600" fill="#2D5BFF">miobellosito.it</text>
  <text x="555" y="722" font-size="14" fill="#1A1A1A">→</text>
  <text x="575" y="722" font-size="14" font-family="JetBrains Mono, monospace" fill="#2A9D8F">188.213.170.214</text>
  <text x="743" y="722" font-size="14" fill="#1A1A1A">" → carichi il codice via SSH/Git → online.</text>

  <!-- Footer -->
  <text x="600" y="785" font-size="11" fill="#999" text-anchor="middle">Vibecoding Serio · Modulo 0 · Infografica 2</text>
</svg>
