<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F1419"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg2)"/>

  <!-- Header -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 0  ·  INFOGRAFICA 02</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Anatomia di un sito online</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">"Ho il server da Aruba" sono in realtà <tspan font-weight="600" fill="#0F1419">quattro</tspan> entità diverse.</text>

  <!-- Browser at top center -->
  <g transform="translate(490, 200)" filter="url(#soft-shadow-2)">
    <rect x="0" y="0" width="220" height="80" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- Browser icon -->
    <g transform="translate(36, 40)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-18" y="-14" width="36" height="28" rx="3"/>
      <line x1="-18" y1="-7" x2="18" y2="-7"/>
      <circle cx="-13" cy="-10.5" r="1.5" fill="#BE123C" stroke="none"/>
      <circle cx="-9" cy="-10.5" r="1.5" fill="#D97706" stroke="none"/>
      <circle cx="-5" cy="-10.5" r="1.5" fill="#0D9488" stroke="none"/>
    </g>
    <text x="80" y="35" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.3">Browser</text>
    <text x="80" y="58" font-size="12" fill="#6B7280">digita "miosito.it"</text>
  </g>

  <!-- Arrow down -->
  <line x1="600" y1="285" x2="600" y2="335" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arrow-dark)"/>

  <!-- 4 ENTITY CARDS -->

  <!-- 1. DOMINIO -->
  <g transform="translate(80, 350)" filter="url(#soft-shadow-2)">
    <rect x="0" y="0" width="240" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="20" y="34" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">01</text>

    <!-- Icon: tag -->
    <g transform="translate(40, 80)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -2,-14 L 18,-14 L 24,-2 L 24,12 L 4,12 L -2,0 Z"/>
      <circle cx="14" cy="-6" r="2.5"/>
    </g>

    <text x="20" y="135" font-size="20" font-weight="700" fill="#0F1419" letter-spacing="-0.3">Dominio</text>
    <text x="20" y="158" font-size="13" font-family="'JetBrains Mono', monospace" fill="#2563EB">miosito.it</text>

    <line x1="20" y1="178" x2="220" y2="178" stroke="#E5E7EB"/>
    <text x="20" y="200" font-size="13" fill="#0F1419">Il nome che digiti</text>
    <text x="20" y="216" font-size="11" fill="#9CA3AF">Comprato dal registrar (Namecheap, Aruba)</text>
  </g>

  <!-- 2. DNS -->
  <g transform="translate(360, 350)" filter="url(#soft-shadow-2)">
    <rect x="0" y="0" width="240" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="20" y="34" font-size="11" font-weight="700" fill="#D97706" letter-spacing="2">02</text>

    <!-- Icon: book/index -->
    <g transform="translate(40, 80)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -16,-14 L -16,14 L 16,14 L 16,-14 Z"/>
      <line x1="0" y1="-14" x2="0" y2="14"/>
      <line x1="-12" y1="-7" x2="-4" y2="-7" stroke="#D97706"/>
      <line x1="-12" y1="-2" x2="-4" y2="-2" stroke="#D97706"/>
      <line x1="-12" y1="3" x2="-4" y2="3" stroke="#D97706"/>
      <line x1="4" y1="-7" x2="12" y2="-7" stroke="#D97706"/>
      <line x1="4" y1="-2" x2="12" y2="-2" stroke="#D97706"/>
      <line x1="4" y1="3" x2="12" y2="3" stroke="#D97706"/>
    </g>

    <text x="20" y="135" font-size="20" font-weight="700" fill="#0F1419" letter-spacing="-0.3">DNS</text>
    <text x="20" y="158" font-size="13" font-family="'JetBrains Mono', monospace" fill="#D97706">→ 188.213.170.214</text>

    <line x1="20" y1="178" x2="220" y2="178" stroke="#E5E7EB"/>
    <text x="20" y="200" font-size="13" fill="#0F1419">L'elenco telefonico</text>
    <text x="20" y="216" font-size="11" fill="#9CA3AF">Traduce nome → IP. Sistema mondiale.</text>
  </g>

  <!-- 3. HOSTING -->
  <g transform="translate(640, 350)" filter="url(#soft-shadow-2)">
    <rect x="0" y="0" width="240" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="20" y="34" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">03</text>

    <!-- Icon: building -->
    <g transform="translate(40, 80)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -14,16 L -14,-14 L 14,-14 L 14,16 Z"/>
      <line x1="-14" y1="16" x2="14" y2="16" stroke-width="2"/>
      <rect x="-9" y="-9" width="5" height="5" stroke="#0D9488"/>
      <rect x="-2" y="-9" width="5" height="5" stroke="#0D9488"/>
      <rect x="5" y="-9" width="5" height="5" stroke="#0D9488"/>
      <rect x="-9" y="-1" width="5" height="5" stroke="#0D9488"/>
      <rect x="-2" y="-1" width="5" height="5" stroke="#0D9488"/>
      <rect x="5" y="-1" width="5" height="5" stroke="#0D9488"/>
      <rect x="-3" y="8" width="6" height="8" fill="#FFFFFF"/>
    </g>

    <text x="20" y="135" font-size="20" font-weight="700" fill="#0F1419" letter-spacing="-0.3">Hosting</text>
    <text x="20" y="158" font-size="13" font-family="'JetBrains Mono', monospace" fill="#0D9488">Aruba · Vercel · AWS</text>

    <line x1="20" y1="178" x2="220" y2="178" stroke="#E5E7EB"/>
    <text x="20" y="200" font-size="13" fill="#0F1419">Il fornitore</text>
    <text x="20" y="216" font-size="11" fill="#9CA3AF">Ti vende il server. Tu paghi mensile/annuale.</text>
  </g>

  <!-- 4. SERVER -->
  <g transform="translate(920, 350)" filter="url(#soft-shadow-2)">
    <rect x="0" y="0" width="200" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="20" y="34" font-size="11" font-weight="700" fill="#0F1419" letter-spacing="2">04</text>

    <!-- Icon: server racks -->
    <g transform="translate(35, 80)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-15" y="-16" width="30" height="11" rx="1.5"/>
      <rect x="-15" y="-3" width="30" height="11" rx="1.5"/>
      <rect x="-15" y="10" width="30" height="11" rx="1.5"/>
      <circle cx="-10" cy="-10.5" r="1" fill="#0D9488" stroke="none"/>
      <circle cx="-10" cy="2.5" r="1" fill="#0D9488" stroke="none"/>
      <circle cx="-10" cy="15.5" r="1" fill="#0D9488" stroke="none"/>
      <line x1="-3" y1="-10.5" x2="10" y2="-10.5"/>
      <line x1="-3" y1="2.5" x2="10" y2="2.5"/>
      <line x1="-3" y1="15.5" x2="10" y2="15.5"/>
    </g>

    <text x="20" y="135" font-size="20" font-weight="700" fill="#0F1419" letter-spacing="-0.3">Server</text>
    <text x="20" y="158" font-size="13" font-family="'JetBrains Mono', monospace" fill="#6B7280">la macchina</text>

    <line x1="20" y1="178" x2="180" y2="178" stroke="#E5E7EB"/>
    <text x="20" y="200" font-size="13" fill="#0F1419">Esegue il tuo codice</text>
    <text x="20" y="216" font-size="11" fill="#9CA3AF">In un data center, attivo 24/7.</text>
  </g>

  <!-- Real example -->
  <g transform="translate(80, 615)">
    <rect x="0" y="0" width="1040" height="115" rx="14" fill="#0F1419"/>
    <text x="28" y="32" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">ESEMPIO REALE  ·  IL FLUSSO COMPLETO</text>

    <text x="28" y="64" font-size="14" fill="#FFFFFF" letter-spacing="-0.2">
      <tspan>Compri</tspan>
      <tspan font-family="'JetBrains Mono', monospace" fill="#60A5FA"> miobellosito.it </tspan>
      <tspan>su Namecheap (12€/anno) </tspan>
      <tspan fill="#9CA3AF">→</tspan>
      <tspan> affitti VPS Aruba (5€/mese, IP </tspan>
      <tspan font-family="'JetBrains Mono', monospace" fill="#5EEAD4">188.213.170.214</tspan>
      <tspan>)</tspan>
    </text>
    <text x="28" y="92" font-size="14" fill="#FFFFFF" letter-spacing="-0.2">
      <tspan fill="#9CA3AF">→</tspan>
      <tspan> configuri record A su Namecheap che dice </tspan>
      <tspan font-family="'JetBrains Mono', monospace" fill="#FBBF24">"miobellosito.it → 188.213.170.214"</tspan>
    </text>
  </g>

  <!-- Footer -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  02/16</text>
</svg>
