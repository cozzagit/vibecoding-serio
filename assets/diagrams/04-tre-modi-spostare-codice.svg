<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="800" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="60" y="70" font-size="32" font-weight="700" fill="#1A1A1A">Da localhost al server in 3 modi</text>
  <text x="60" y="100" font-size="16" fill="#666">FTP · SSH · Git push — come il tuo codice arriva online</text>

  <!-- FTP STRIP -->
  <g>
    <rect x="60" y="150" width="1080" height="160" rx="14" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="2"/>

    <text x="120" y="200" font-size="42" text-anchor="middle">📁</text>
    <text x="120" y="240" font-size="20" font-weight="700" fill="#1A1A1A" text-anchor="middle">FTP</text>
    <text x="120" y="262" font-size="11" fill="#999" text-anchor="middle">vecchia scuola</text>

    <text x="200" y="200" font-size="14" font-weight="600" fill="#999">COSA FAI</text>
    <text x="200" y="225" font-size="14" fill="#1A1A1A">Apri FileZilla → ti connetti → trascini file</text>
    <text x="200" y="245" font-size="14" fill="#1A1A1A">dal tuo PC al server (drag &amp; drop)</text>

    <text x="200" y="282" font-size="11" font-weight="600" fill="#999">QUANDO</text>
    <text x="280" y="282" font-size="13" fill="#1A1A1A">WordPress su Aruba Hosting Linux · siti PHP legacy · upload immagini</text>

    <!-- Indicators -->
    <rect x="780" y="180" width="80" height="28" rx="6" fill="#E63946" opacity="0.15"/>
    <text x="820" y="199" font-size="12" fill="#A0202B" text-anchor="middle" font-weight="600">⚠ lento</text>
    <rect x="870" y="180" width="100" height="28" rx="6" fill="#E63946" opacity="0.15"/>
    <text x="920" y="199" font-size="12" fill="#A0202B" text-anchor="middle" font-weight="600">⚠ insicuro*</text>
    <text x="780" y="232" font-size="11" fill="#999" font-style="italic">* preferisci sempre SFTP (cifrato)</text>

    <text x="980" y="180" font-size="11" font-weight="600" fill="#999">TEMPO</text>
    <text x="1075" y="200" font-size="22" font-weight="700" fill="#E63946" text-anchor="middle">2-10 min</text>
    <text x="1075" y="220" font-size="11" fill="#999" text-anchor="middle">a deploy</text>
  </g>

  <!-- SSH STRIP -->
  <g>
    <rect x="60" y="330" width="1080" height="160" rx="14" fill="#FFFFFF" stroke="#FF7A3D" stroke-width="2"/>

    <text x="120" y="380" font-size="42" text-anchor="middle">⌨️</text>
    <text x="120" y="420" font-size="20" font-weight="700" fill="#FF7A3D" text-anchor="middle">SSH</text>
    <text x="120" y="442" font-size="11" fill="#999" text-anchor="middle">modo serio</text>

    <text x="200" y="378" font-size="14" font-weight="600" fill="#999">COSA FAI</text>
    <text x="200" y="403" font-size="14" font-family="JetBrains Mono, monospace" fill="#1A1A1A">$ ssh root@188.213.170.214</text>
    <text x="200" y="423" font-size="14" font-family="JetBrains Mono, monospace" fill="#1A1A1A">$ git pull &amp;&amp; pnpm build &amp;&amp; pm2 restart</text>

    <text x="200" y="462" font-size="11" font-weight="600" fill="#999">QUANDO</text>
    <text x="280" y="462" font-size="13" fill="#1A1A1A">VPS Aruba/Hetzner · controllo totale · troubleshooting · gestione log</text>

    <rect x="780" y="360" width="80" height="28" rx="6" fill="#2A9D8F" opacity="0.15"/>
    <text x="820" y="379" font-size="12" fill="#1A6B5F" text-anchor="middle" font-weight="600">✓ veloce</text>
    <rect x="870" y="360" width="100" height="28" rx="6" fill="#2A9D8F" opacity="0.15"/>
    <text x="920" y="379" font-size="12" fill="#1A6B5F" text-anchor="middle" font-weight="600">✓ sicuro</text>

    <text x="980" y="360" font-size="11" font-weight="600" fill="#999">TEMPO</text>
    <text x="1075" y="380" font-size="22" font-weight="700" fill="#FF7A3D" text-anchor="middle">1-3 min</text>
    <text x="1075" y="400" font-size="11" fill="#999" text-anchor="middle">a deploy</text>
  </g>

  <!-- GIT STRIP -->
  <g>
    <rect x="60" y="510" width="1080" height="160" rx="14" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="2"/>

    <text x="120" y="560" font-size="42" text-anchor="middle">🚀</text>
    <text x="120" y="600" font-size="18" font-weight="700" fill="#2A9D8F" text-anchor="middle">GIT PUSH</text>
    <text x="120" y="622" font-size="11" fill="#999" text-anchor="middle">modo moderno</text>

    <text x="200" y="558" font-size="14" font-weight="600" fill="#999">COSA FAI</text>
    <text x="200" y="583" font-size="14" font-family="JetBrains Mono, monospace" fill="#1A1A1A">$ git push origin main</text>
    <text x="200" y="603" font-size="14" fill="#666" font-style="italic">… e Vercel/Netlify si arrangia. Build, deploy, online.</text>

    <text x="200" y="642" font-size="11" font-weight="600" fill="#999">QUANDO</text>
    <text x="280" y="642" font-size="13" fill="#1A1A1A">Next.js · Astro · React · qualunque cosa moderna · zero touch</text>

    <rect x="780" y="540" width="80" height="28" rx="6" fill="#2A9D8F" opacity="0.15"/>
    <text x="820" y="559" font-size="12" fill="#1A6B5F" text-anchor="middle" font-weight="600">✓ comodo</text>
    <rect x="870" y="540" width="100" height="28" rx="6" fill="#2A9D8F" opacity="0.15"/>
    <text x="920" y="559" font-size="12" fill="#1A6B5F" text-anchor="middle" font-weight="600">✓ versioned</text>

    <text x="980" y="540" font-size="11" font-weight="600" fill="#999">TEMPO</text>
    <text x="1075" y="560" font-size="22" font-weight="700" fill="#2A9D8F" text-anchor="middle">30 sec</text>
    <text x="1075" y="580" font-size="11" fill="#999" text-anchor="middle">a deploy</text>
  </g>

  <!-- Bottom note -->
  <rect x="60" y="700" width="1080" height="50" rx="10" fill="#FFFFFF" stroke="#E5E5E0" stroke-dasharray="4 3"/>
  <text x="600" y="731" font-size="14" fill="#1A1A1A" text-anchor="middle" font-style="italic">Userai il #3 il 90% delle volte. Ogni tanto il #2. Il #1 quasi mai (ma è utile saperlo per WordPress).</text>

  <text x="600" y="785" font-size="11" fill="#999" text-anchor="middle">Vibecoding Serio · Modulo 0 · Infografica 4</text>
</svg>
