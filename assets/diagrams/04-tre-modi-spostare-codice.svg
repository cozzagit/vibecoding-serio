<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg4)"/>

  <!-- Header -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 0  ·  INFOGRAFICA 04</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Da localhost al server in tre modi</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">FTP · SSH · Git push — come il tuo codice arriva online.</text>

  <!-- FTP -->
  <g transform="translate(80, 200)" filter="url(#soft-shadow-4)">
    <rect x="0" y="0" width="1040" height="155" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>

    <!-- Number badge -->
    <text x="36" y="50" font-size="64" font-weight="700" fill="#F3F4F6" letter-spacing="-3">01</text>

    <!-- Icon: file folder -->
    <g transform="translate(56, 95)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -22,-12 L -8,-12 L -4,-8 L 22,-8 L 22,16 L -22,16 Z"/>
      <line x1="-22" y1="-2" x2="22" y2="-2" stroke="#9CA3AF"/>
    </g>

    <!-- Title -->
    <text x="160" y="48" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">VECCHIA SCUOLA</text>
    <text x="160" y="78" font-size="26" font-weight="700" fill="#0F1419" letter-spacing="-0.5">FTP <tspan font-size="14" fill="#9CA3AF" font-weight="400">— File Transfer Protocol</tspan></text>
    <text x="160" y="105" font-size="14" fill="#0F1419" letter-spacing="-0.2">Apri FileZilla → ti connetti → trascini i file dal PC al server.</text>
    <text x="160" y="125" font-size="13" fill="#6B7280" letter-spacing="-0.1">Quando: WordPress su Aruba Linux · siti PHP legacy · upload immagini massicce.</text>

    <!-- Status badges -->
    <g transform="translate(680, 50)">
      <rect x="0" y="0" width="86" height="26" rx="6" fill="#FEE2E2"/>
      <text x="43" y="17" font-size="11" font-weight="600" fill="#991B1B" text-anchor="middle">⚠ lento</text>
    </g>
    <g transform="translate(774, 50)">
      <rect x="0" y="0" width="100" height="26" rx="6" fill="#FEE2E2"/>
      <text x="50" y="17" font-size="11" font-weight="600" fill="#991B1B" text-anchor="middle">⚠ insicuro*</text>
    </g>
    <text x="680" y="103" font-size="11" fill="#9CA3AF" font-style="italic">* preferisci sempre SFTP cifrato.</text>

    <!-- Time -->
    <line x1="900" y1="35" x2="900" y2="120" stroke="#E5E7EB"/>
    <text x="970" y="55" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="2" text-anchor="middle">DEPLOY</text>
    <text x="970" y="93" font-size="28" font-weight="700" fill="#BE123C" text-anchor="middle" letter-spacing="-0.5">2-10 min</text>
    <text x="970" y="115" font-size="11" fill="#9CA3AF" text-anchor="middle">tempo medio</text>
  </g>

  <!-- SSH -->
  <g transform="translate(80, 380)" filter="url(#soft-shadow-4)">
    <rect x="0" y="0" width="1040" height="155" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>

    <text x="36" y="50" font-size="64" font-weight="700" fill="#FEF3C7" letter-spacing="-3">02</text>

    <!-- Icon: terminal -->
    <g transform="translate(56, 95)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-22" y="-14" width="44" height="32" rx="3"/>
      <line x1="-22" y1="-7" x2="22" y2="-7"/>
      <polyline points="-15,2 -10,7 -15,12" stroke="#D97706" stroke-width="2"/>
      <line x1="-6" y1="12" x2="6" y2="12" stroke="#D97706" stroke-width="2"/>
    </g>

    <text x="160" y="48" font-size="11" font-weight="700" fill="#D97706" letter-spacing="2">MODO SERIO</text>
    <text x="160" y="78" font-size="26" font-weight="700" fill="#0F1419" letter-spacing="-0.5">SSH <tspan font-size="14" fill="#9CA3AF" font-weight="400">— Secure Shell</tspan></text>

    <!-- Code lines -->
    <rect x="160" y="92" width="500" height="42" rx="6" fill="#0F1419"/>
    <text x="172" y="110" font-size="12" font-family="'JetBrains Mono', monospace" fill="#5EEAD4">$ ssh root@188.213.170.214</text>
    <text x="172" y="127" font-size="12" font-family="'JetBrains Mono', monospace" fill="#FFFFFF">$ git pull &amp;&amp; pnpm build &amp;&amp; pm2 restart cantiere</text>

    <!-- Status badges -->
    <g transform="translate(680, 50)">
      <rect x="0" y="0" width="86" height="26" rx="6" fill="#D1FAE5"/>
      <text x="43" y="17" font-size="11" font-weight="600" fill="#065F46" text-anchor="middle">✓ veloce</text>
    </g>
    <g transform="translate(774, 50)">
      <rect x="0" y="0" width="86" height="26" rx="6" fill="#D1FAE5"/>
      <text x="43" y="17" font-size="11" font-weight="600" fill="#065F46" text-anchor="middle">✓ sicuro</text>
    </g>

    <line x1="900" y1="35" x2="900" y2="120" stroke="#E5E7EB"/>
    <text x="970" y="55" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="2" text-anchor="middle">DEPLOY</text>
    <text x="970" y="93" font-size="28" font-weight="700" fill="#D97706" text-anchor="middle" letter-spacing="-0.5">1-3 min</text>
    <text x="970" y="115" font-size="11" fill="#9CA3AF" text-anchor="middle">tempo medio</text>
  </g>

  <!-- GIT PUSH -->
  <g transform="translate(80, 560)" filter="url(#soft-shadow-4)">
    <rect x="0" y="0" width="1040" height="155" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>

    <text x="36" y="50" font-size="64" font-weight="700" fill="#CCFBF1" letter-spacing="-3">03</text>

    <!-- Icon: rocket / branch -->
    <g transform="translate(56, 95)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-18" cy="-12" r="3"/>
      <circle cx="-18" cy="12" r="3"/>
      <circle cx="14" cy="-12" r="3"/>
      <line x1="-18" y1="-9" x2="-18" y2="9"/>
      <path d="M -15,-12 Q 0,-12 14,-12" />
      <path d="M -15,12 Q 8,12 14,-9" stroke="#0D9488"/>
    </g>

    <text x="160" y="48" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">MODO MODERNO</text>
    <text x="160" y="78" font-size="26" font-weight="700" fill="#0F1419" letter-spacing="-0.5">Git Push <tspan font-size="14" fill="#9CA3AF" font-weight="400">+ deploy automatico</tspan></text>

    <rect x="160" y="92" width="280" height="42" rx="6" fill="#0F1419"/>
    <text x="172" y="119" font-size="14" font-family="'JetBrains Mono', monospace" fill="#5EEAD4">$ git push origin main</text>

    <text x="460" y="111" font-size="13" fill="#6B7280" letter-spacing="-0.1" font-style="italic">… e Vercel/Netlify si arrangia.</text>
    <text x="460" y="128" font-size="13" fill="#6B7280" letter-spacing="-0.1" font-style="italic">Build, deploy, online. Zero touch.</text>

    <g transform="translate(680, 50)">
      <rect x="0" y="0" width="86" height="26" rx="6" fill="#D1FAE5"/>
      <text x="43" y="17" font-size="11" font-weight="600" fill="#065F46" text-anchor="middle">✓ comodo</text>
    </g>
    <g transform="translate(774, 50)">
      <rect x="0" y="0" width="100" height="26" rx="6" fill="#D1FAE5"/>
      <text x="50" y="17" font-size="11" font-weight="600" fill="#065F46" text-anchor="middle">✓ versioned</text>
    </g>

    <line x1="900" y1="35" x2="900" y2="120" stroke="#E5E7EB"/>
    <text x="970" y="55" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="2" text-anchor="middle">DEPLOY</text>
    <text x="970" y="93" font-size="28" font-weight="700" fill="#0D9488" text-anchor="middle" letter-spacing="-0.5">~30 sec</text>
    <text x="970" y="115" font-size="11" fill="#9CA3AF" text-anchor="middle">tempo medio</text>
  </g>

  <!-- Footer -->
  <text x="600" y="763" font-size="14" fill="#6B7280" font-style="italic" text-anchor="middle" letter-spacing="-0.2">Userai il #3 il 90% delle volte. Ogni tanto il #2. Il #1 quasi mai (ma utile saperlo).</text>
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  04/16</text>
</svg>
