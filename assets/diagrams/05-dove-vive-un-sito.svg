<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F1419"/>
    </marker>
    <marker id="arr5-back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg5)"/>

  <!-- Header -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 1  ·  INFOGRAFICA 05</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Dove vive un sito</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Le cinque entità connesse che compongono ogni sito web moderno.</text>

  <!-- The flow chain -->
  <g transform="translate(80, 240)">

    <!-- USER -->
    <g transform="translate(0, 60)" filter="url(#soft-shadow-5)">
      <circle cx="55" cy="55" r="55" fill="#FFFFFF" stroke="#E5E7EB"/>
      <!-- person icon -->
      <g transform="translate(55, 55)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="0" cy="-10" r="9"/>
        <path d="M -16,16 Q -16,2 0,2 Q 16,2 16,16"/>
      </g>
      <text x="55" y="135" font-size="11" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="2">UTENTE</text>
    </g>

    <line x1="115" y1="115" x2="170" y2="115" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- BROWSER -->
    <g transform="translate(180, 60)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">01</text>
      <!-- icon: browser window -->
      <g transform="translate(80, 60)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-22" y="-14" width="44" height="28" rx="3"/>
        <line x1="-22" y1="-6" x2="22" y2="-6"/>
        <circle cx="-17" cy="-10" r="1.2" fill="#BE123C" stroke="none"/>
        <circle cx="-13" cy="-10" r="1.2" fill="#D97706" stroke="none"/>
        <circle cx="-9" cy="-10" r="1.2" fill="#0D9488" stroke="none"/>
      </g>
      <text x="80" y="100" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Browser</text>
    </g>

    <!-- DNS branch (above) -->
    <line x1="260" y1="60" x2="260" y2="0" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="3 3"/>
    <g transform="translate(180, -100)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="100" rx="14" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
      <text x="20" y="30" font-size="11" font-weight="700" fill="#D97706" letter-spacing="2">02</text>
      <!-- icon: directory book -->
      <g transform="translate(80, 55)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-12" y="-12" width="24" height="20" rx="1"/>
        <line x1="-7" y1="-7" x2="7" y2="-7" stroke="#D97706"/>
        <line x1="-7" y1="-3" x2="7" y2="-3" stroke="#D97706"/>
        <line x1="-7" y1="1" x2="7" y2="1" stroke="#D97706"/>
      </g>
      <text x="80" y="92" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">DNS</text>
    </g>

    <line x1="340" y1="115" x2="395" y2="115" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- CDN -->
    <g transform="translate(405, 60)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="2">03</text>
      <!-- icon: distributed nodes -->
      <g transform="translate(80, 60)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="0" cy="-8" r="3"/>
        <circle cx="-12" cy="6" r="3"/>
        <circle cx="12" cy="6" r="3"/>
        <line x1="-2" y1="-5" x2="-9" y2="3" stroke="#7C3AED"/>
        <line x1="2" y1="-5" x2="9" y2="3" stroke="#7C3AED"/>
        <line x1="-9" y1="6" x2="9" y2="6" stroke="#7C3AED"/>
      </g>
      <text x="80" y="100" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">CDN <tspan font-size="10" fill="#9CA3AF">(opz)</tspan></text>
    </g>

    <line x1="565" y1="115" x2="620" y2="115" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- SERVER -->
    <g transform="translate(630, 60)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">04</text>
      <g transform="translate(80, 60)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-15" y="-14" width="30" height="9" rx="1.5"/>
        <rect x="-15" y="-3" width="30" height="9" rx="1.5"/>
        <rect x="-15" y="8" width="30" height="9" rx="1.5"/>
        <circle cx="-10" cy="-9.5" r="0.8" fill="#0D9488" stroke="none"/>
        <circle cx="-10" cy="1.5" r="0.8" fill="#0D9488" stroke="none"/>
        <circle cx="-10" cy="12.5" r="0.8" fill="#0D9488" stroke="none"/>
      </g>
      <text x="80" y="100" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Server</text>
    </g>

    <line x1="790" y1="115" x2="845" y2="115" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- DATABASE -->
    <g transform="translate(855, 60)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#BE123C" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#BE123C" letter-spacing="2">05</text>
      <g transform="translate(80, 60)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="0" cy="-12" rx="14" ry="4"/>
        <path d="M -14,-12 L -14,12 Q -14,16 0,16 Q 14,16 14,12 L 14,-12"/>
        <path d="M -14,-2 Q -14,2 0,2 Q 14,2 14,-2"/>
        <path d="M -14,8 Q -14,12 0,12 Q 14,12 14,8"/>
      </g>
      <text x="80" y="100" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Database</text>
    </g>

    <!-- Reverse arrow indicator -->
    <g opacity="0.5">
      <line x1="990" y1="135" x2="180" y2="135" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2 3" marker-end="url(#arr5-back)"/>
      <text x="585" y="155" font-size="11" fill="#9CA3AF" font-style="italic" text-anchor="middle">la risposta torna indietro</text>
    </g>

  </g>

  <!-- Diagnostic table -->
  <g transform="translate(80, 470)" filter="url(#soft-shadow-5)">
    <rect x="0" y="0" width="1040" height="270" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="32" y="40" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">QUANDO QUALCOSA SI ROMPE  ·  GUIDA RAPIDA ALLA DIAGNOSI</text>

    <!-- Header row -->
    <line x1="32" y1="60" x2="1008" y2="60" stroke="#E5E7EB"/>
    <text x="32" y="84" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="1.5">SINTOMO</text>
    <text x="600" y="84" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="1.5">PROBABILE COLPEVOLE</text>

    <!-- rows -->
    <g font-size="13" letter-spacing="-0.1">
      <line x1="32" y1="100" x2="1008" y2="100" stroke="#F3F4F6"/>
      <text x="32" y="123" fill="#0F1419">"Sito irraggiungibile" / errore DNS</text>
      <text x="600" y="123" fill="#D97706" font-weight="600">DNS</text>
      <text x="660" y="123" fill="#6B7280">non configurato o non propagato</text>

      <line x1="32" y1="140" x2="1008" y2="140" stroke="#F3F4F6"/>
      <text x="32" y="163" fill="#0F1419">Sito carica ma immagini / CSS mancano</text>
      <text x="600" y="163" fill="#7C3AED" font-weight="600">CDN</text>
      <text x="660" y="163" fill="#6B7280">o asset statici non deployati</text>

      <line x1="32" y1="180" x2="1008" y2="180" stroke="#F3F4F6"/>
      <text x="32" y="203" fill="#0F1419">Pagina ok ma il login non parte</text>
      <text x="600" y="203" fill="#0D9488" font-weight="600">Server</text>
      <text x="660" y="203" fill="#6B7280">codice o variabili .env mancanti</text>

      <line x1="32" y1="220" x2="1008" y2="220" stroke="#F3F4F6"/>
      <text x="32" y="243" fill="#0F1419">Login ok ma "il prodotto è sparito"</text>
      <text x="600" y="243" fill="#BE123C" font-weight="600">Database</text>
      <text x="660" y="243" fill="#6B7280">o query sbagliata, migration mancante</text>
    </g>
  </g>

  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  05/16</text>
</svg>
