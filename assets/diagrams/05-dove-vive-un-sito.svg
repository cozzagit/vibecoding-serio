<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F1419"/>
    </marker>
    <marker id="arr5-back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg5)"/>

  <!-- ========== HEADER (zona riservata y=0..200) ========== -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 1  ·  INFOGRAFICA 05</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Dove vive un sito</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Le cinque entità connesse che compongono ogni sito web moderno.</text>

  <!-- ========== CONTENUTO (y >= 200) ========== -->

  <!-- DNS placed ABOVE the main row, ma dentro zona sicura y=215..305 -->
  <g transform="translate(395, 215)" filter="url(#soft-shadow-5)">
    <rect x="0" y="0" width="160" height="90" rx="14" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
    <text x="20" y="28" font-size="11" font-weight="700" fill="#D97706" letter-spacing="2">02</text>
    <g transform="translate(80, 50)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-12" y="-10" width="24" height="20" rx="1.5"/>
      <line x1="-7" y1="-5" x2="7" y2="-5" stroke="#D97706"/>
      <line x1="-7" y1="-1" x2="7" y2="-1" stroke="#D97706"/>
      <line x1="-7" y1="3" x2="7" y2="3" stroke="#D97706"/>
    </g>
    <text x="80" y="80" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">DNS</text>
  </g>

  <!-- Connector line DNS → Browser -->
  <line x1="475" y1="305" x2="475" y2="370" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="498" y="345" font-size="10" fill="#9CA3AF" font-style="italic">il browser chiede al DNS</text>

  <!-- Main flow row: y=370..480 -->
  <g transform="translate(80, 370)">

    <!-- USER -->
    <g transform="translate(0, 0)" filter="url(#soft-shadow-5)">
      <circle cx="55" cy="55" r="55" fill="#FFFFFF" stroke="#E5E7EB"/>
      <g transform="translate(55, 55)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="0" cy="-10" r="9"/>
        <path d="M -16,16 Q -16,2 0,2 Q 16,2 16,16"/>
      </g>
      <text x="55" y="135" font-size="11" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="2">UTENTE</text>
    </g>

    <line x1="115" y1="55" x2="170" y2="55" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- BROWSER (01) -->
    <g transform="translate(180, 0)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
      <text x="20" y="28" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">01</text>
      <g transform="translate(80, 56)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-22" y="-14" width="44" height="28" rx="3"/>
        <line x1="-22" y1="-6" x2="22" y2="-6"/>
        <circle cx="-17" cy="-10" r="1.2" fill="#BE123C" stroke="none"/>
        <circle cx="-13" cy="-10" r="1.2" fill="#D97706" stroke="none"/>
        <circle cx="-9" cy="-10" r="1.2" fill="#0D9488" stroke="none"/>
      </g>
      <text x="80" y="98" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Browser</text>
    </g>

    <line x1="340" y1="55" x2="395" y2="55" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- CDN (03) -->
    <g transform="translate(405, 0)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="20" y="28" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="2">03</text>
      <g transform="translate(80, 56)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="0" cy="-8" r="3"/>
        <circle cx="-12" cy="6" r="3"/>
        <circle cx="12" cy="6" r="3"/>
        <line x1="-2" y1="-5" x2="-9" y2="3" stroke="#7C3AED"/>
        <line x1="2" y1="-5" x2="9" y2="3" stroke="#7C3AED"/>
        <line x1="-9" y1="6" x2="9" y2="6" stroke="#7C3AED"/>
      </g>
      <text x="80" y="98" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">CDN <tspan font-size="10" fill="#9CA3AF">(opz)</tspan></text>
    </g>

    <line x1="565" y1="55" x2="620" y2="55" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- SERVER (04) -->
    <g transform="translate(630, 0)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5"/>
      <text x="20" y="28" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">04</text>
      <g transform="translate(80, 56)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-15" y="-14" width="30" height="9" rx="1.5"/>
        <rect x="-15" y="-3" width="30" height="9" rx="1.5"/>
        <rect x="-15" y="8" width="30" height="9" rx="1.5"/>
        <circle cx="-10" cy="-9.5" r="0.8" fill="#0D9488" stroke="none"/>
        <circle cx="-10" cy="1.5" r="0.8" fill="#0D9488" stroke="none"/>
        <circle cx="-10" cy="12.5" r="0.8" fill="#0D9488" stroke="none"/>
      </g>
      <text x="80" y="98" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Server</text>
    </g>

    <line x1="790" y1="55" x2="845" y2="55" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr5)"/>

    <!-- DATABASE (05) -->
    <g transform="translate(855, 0)" filter="url(#soft-shadow-5)">
      <rect x="0" y="0" width="160" height="110" rx="14" fill="#FFFFFF" stroke="#BE123C" stroke-width="1.5"/>
      <text x="20" y="28" font-size="11" font-weight="700" fill="#BE123C" letter-spacing="2">05</text>
      <g transform="translate(80, 56)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="0" cy="-12" rx="14" ry="4"/>
        <path d="M -14,-12 L -14,12 Q -14,16 0,16 Q 14,16 14,12 L 14,-12"/>
        <path d="M -14,-2 Q -14,2 0,2 Q 14,2 14,-2"/>
        <path d="M -14,8 Q -14,12 0,12 Q 14,12 14,8"/>
      </g>
      <text x="80" y="98" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Database</text>
    </g>

    <!-- Reverse arrow indicator (response flow) -->
    <g opacity="0.5">
      <line x1="990" y1="135" x2="180" y2="135" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2 3" marker-end="url(#arr5-back)"/>
      <rect x="455" y="146" width="200" height="18" rx="3" fill="url(#bg5)"/>
      <text x="555" y="159" font-size="11" fill="#9CA3AF" font-style="italic" text-anchor="middle">la risposta torna indietro</text>
    </g>

  </g>

  <!-- Diagnostic table — y=540..760 -->
  <g transform="translate(80, 540)" filter="url(#soft-shadow-5)">
    <rect x="0" y="0" width="1040" height="220" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="32" y="36" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">QUANDO QUALCOSA SI ROMPE  ·  GUIDA RAPIDA ALLA DIAGNOSI</text>

    <line x1="32" y1="56" x2="1008" y2="56" stroke="#E5E7EB"/>
    <text x="32" y="78" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="1.5">SINTOMO</text>
    <text x="600" y="78" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="1.5">PROBABILE COLPEVOLE</text>

    <g font-size="13" letter-spacing="-0.1">
      <line x1="32" y1="92" x2="1008" y2="92" stroke="#F3F4F6"/>
      <text x="32" y="114" fill="#0F1419">"Sito irraggiungibile" / errore DNS</text>
      <text x="600" y="114" fill="#D97706" font-weight="600">DNS</text>
      <text x="660" y="114" fill="#6B7280">non configurato o non propagato</text>

      <line x1="32" y1="128" x2="1008" y2="128" stroke="#F3F4F6"/>
      <text x="32" y="150" fill="#0F1419">Sito carica ma immagini / CSS mancano</text>
      <text x="600" y="150" fill="#7C3AED" font-weight="600">CDN</text>
      <text x="660" y="150" fill="#6B7280">o asset statici non deployati</text>

      <line x1="32" y1="164" x2="1008" y2="164" stroke="#F3F4F6"/>
      <text x="32" y="186" fill="#0F1419">Pagina ok ma il login non parte</text>
      <text x="600" y="186" fill="#0D9488" font-weight="600">Server</text>
      <text x="660" y="186" fill="#6B7280">codice o variabili .env mancanti</text>

      <line x1="32" y1="200" x2="1008" y2="200" stroke="#F3F4F6"/>
      <text x="32" y="216" fill="#0F1419">Login ok ma "il prodotto è sparito"</text>
      <text x="600" y="216" fill="#BE123C" font-weight="600">Database</text>
      <text x="660" y="216" fill="#6B7280">o query sbagliata, migration mancante</text>
    </g>
  </g>

  <!-- ========== FOOTER (y=788) ========== -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  05/16</text>
</svg>
