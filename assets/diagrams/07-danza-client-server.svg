<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-7" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-req" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arr-res" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0D9488"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg7)"/>

  <!-- HEADER (zona riservata y=0..200) -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 2  ·  INFOGRAFICA 07</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">La danza client-server</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Tutta Internet è una conversazione in due — chi chiede, chi risponde.</text>

  <!-- CONTENUTO y>=200 -->

  <!-- Two columns header -->
  <g transform="translate(80, 220)">
    <!-- CLIENT col header -->
    <rect x="0" y="0" width="500" height="60" rx="14" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5" filter="url(#soft-shadow-7)"/>
    <g transform="translate(40, 30)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-14" y="-10" width="28" height="20" rx="2"/>
      <line x1="-14" y1="-4" x2="14" y2="-4"/>
    </g>
    <text x="80" y="28" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">CLIENT</text>
    <text x="80" y="50" font-size="16" font-weight="700" fill="#0F1419">Browser · App mobile</text>

    <!-- SERVER col header -->
    <rect x="540" y="0" width="500" height="60" rx="14" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5" filter="url(#soft-shadow-7)"/>
    <g transform="translate(580, 30)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-14" y="-12" width="28" height="8" rx="1.5"/>
      <rect x="-14" y="-2" width="28" height="8" rx="1.5"/>
      <rect x="-14" y="8" width="28" height="8" rx="1.5"/>
      <circle cx="-9" cy="-8" r="0.9" fill="#0D9488" stroke="none"/>
      <circle cx="-9" cy="2" r="0.9" fill="#0D9488" stroke="none"/>
      <circle cx="-9" cy="12" r="0.9" fill="#0D9488" stroke="none"/>
    </g>
    <text x="620" y="28" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">SERVER</text>
    <text x="620" y="50" font-size="16" font-weight="700" fill="#0F1419">Aspetta richieste, risponde</text>
  </g>

  <!-- Vertical timeline columns -->
  <line x1="330" y1="300" x2="330" y2="640" stroke="#2563EB" stroke-width="2" opacity="0.15"/>
  <line x1="870" y1="300" x2="870" y2="640" stroke="#0D9488" stroke-width="2" opacity="0.15"/>

  <!-- Step labels (left) -->
  <text x="100" y="320" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">ESEMPIO  ·  L'UTENTE FA LOGIN</text>

  <!-- 4 messages -->

  <!-- Message 1: Client → Server -->
  <g transform="translate(0, 360)">
    <text x="100" y="0" font-size="12" font-weight="700" fill="#2563EB">01</text>
    <text x="125" y="0" font-size="14" fill="#0F1419">L'utente preme "Accedi"</text>

    <line x1="330" y1="20" x2="870" y2="20" stroke="#2563EB" stroke-width="2" marker-end="url(#arr-req)"/>
    <rect x="450" y="0" width="300" height="36" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="465" y="22" font-size="12" font-family="'JetBrains Mono', monospace" fill="#2563EB">POST /api/login</text>
    <text x="465" y="34" font-size="10" font-family="'JetBrains Mono', monospace" fill="#6B7280">{ email, password }</text>
  </g>

  <!-- Message 2: Server → Client -->
  <g transform="translate(0, 430)">
    <line x1="870" y1="20" x2="330" y2="20" stroke="#0D9488" stroke-width="2" marker-end="url(#arr-res)"/>
    <rect x="450" y="0" width="300" height="36" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="465" y="22" font-size="12" font-family="'JetBrains Mono', monospace" fill="#0D9488">200 OK</text>
    <text x="465" y="34" font-size="10" font-family="'JetBrains Mono', monospace" fill="#6B7280">+ cookie sessione</text>

    <text x="900" y="0" font-size="12" font-weight="700" fill="#0D9488">02</text>
    <text x="925" y="0" font-size="14" fill="#0F1419">Il server verifica e crea sessione</text>
  </g>

  <!-- Message 3: Client → Server -->
  <g transform="translate(0, 500)">
    <text x="100" y="0" font-size="12" font-weight="700" fill="#2563EB">03</text>
    <text x="125" y="0" font-size="14" fill="#0F1419">Il client chiede dati protetti</text>

    <line x1="330" y1="20" x2="870" y2="20" stroke="#2563EB" stroke-width="2" marker-end="url(#arr-req)"/>
    <rect x="450" y="0" width="300" height="36" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="465" y="22" font-size="12" font-family="'JetBrains Mono', monospace" fill="#2563EB">GET /api/profile</text>
    <text x="465" y="34" font-size="10" font-family="'JetBrains Mono', monospace" fill="#6B7280">+ cookie sessione</text>
  </g>

  <!-- Message 4: Server → Client -->
  <g transform="translate(0, 570)">
    <line x1="870" y1="20" x2="330" y2="20" stroke="#0D9488" stroke-width="2" marker-end="url(#arr-res)"/>
    <rect x="450" y="0" width="300" height="36" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="465" y="22" font-size="12" font-family="'JetBrains Mono', monospace" fill="#0D9488">200 OK</text>
    <text x="465" y="34" font-size="10" font-family="'JetBrains Mono', monospace" fill="#6B7280">{ name, email, ... }</text>

    <text x="900" y="0" font-size="12" font-weight="700" fill="#0D9488">04</text>
    <text x="925" y="0" font-size="14" fill="#0F1419">Riconosce l'utente, manda i dati</text>
  </g>

  <!-- Bottom rule callout -->
  <g transform="translate(80, 670)">
    <rect x="0" y="0" width="1040" height="80" rx="14" fill="#0F1419"/>
    <text x="32" y="32" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">REGOLA D'ORO</text>
    <text x="32" y="62" font-size="16" fill="#FFFFFF" letter-spacing="-0.2">
      Cliente <tspan fill="#60A5FA">chiede</tspan>, server <tspan fill="#5EEAD4">risponde</tspan>. Sempre. Le due parti non si conoscono — parlano solo per messaggi HTTP.
    </text>
  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  07/16</text>
</svg>
