<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bottleneck" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FEF2F2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg6)"/>

  <!-- Header -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 1  ·  INFOGRAFICA 06</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Il viaggio del click</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Cosa succede in 200-800 millisecondi tra il click e la pagina visualizzata.</text>

  <!-- 8 STEPS -->
  <g transform="translate(80, 215)">

    <!-- Step 1 -->
    <g transform="translate(0, 0)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="120" height="190" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="14" y="32" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.3">01</text>
      <line x1="14" y1="42" x2="36" y2="42" stroke="#0F1419" stroke-width="2"/>

      <!-- Icon: cursor click -->
      <g transform="translate(60, 90)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M -10,-12 L -10,8 L -4,4 L 0,12 L 4,10 L 0,2 L 8,2 Z"/>
        <line x1="-15" y1="-15" x2="-12" y2="-12" stroke="#D97706"/>
        <line x1="-18" y1="-9" x2="-15" y2="-9" stroke="#D97706"/>
        <line x1="-15" y1="-3" x2="-12" y2="-6" stroke="#D97706"/>
      </g>

      <text x="60" y="148" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">Click</text>
      <text x="60" y="166" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.5">0 ms</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(130, 0)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="120" height="190" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="14" y="32" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.3">02</text>
      <line x1="14" y1="42" x2="36" y2="42" stroke="#0F1419" stroke-width="2"/>

      <!-- Icon: search -->
      <g transform="translate(60, 90)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="-3" cy="-3" r="10"/>
        <line x1="5" y1="5" x2="13" y2="13" stroke-width="2"/>
        <line x1="-7" y1="-3" x2="1" y2="-3" stroke="#D97706"/>
        <line x1="-3" y1="-7" x2="-3" y2="1" stroke="#D97706"/>
      </g>

      <text x="60" y="148" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">DNS</text>
      <text x="60" y="166" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.5">20-100 ms</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(260, 0)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="120" height="190" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="14" y="32" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.3">03</text>
      <line x1="14" y1="42" x2="36" y2="42" stroke="#0F1419" stroke-width="2"/>

      <!-- Icon: handshake / lock -->
      <g transform="translate(60, 90)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-10" y="-2" width="20" height="14" rx="2"/>
        <path d="M -6,-2 L -6,-8 Q -6,-14 0,-14 Q 6,-14 6,-8 L 6,-2"/>
        <circle cx="0" cy="5" r="1.5" fill="#0D9488" stroke="none"/>
      </g>

      <text x="60" y="148" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">TCP + TLS</text>
      <text x="60" y="166" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.5">50-200 ms</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(390, 0)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="120" height="190" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="14" y="32" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.3">04</text>
      <line x1="14" y1="42" x2="36" y2="42" stroke="#0F1419" stroke-width="2"/>

      <!-- Icon: arrow up envelope -->
      <g transform="translate(60, 90)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-12" y="-2" width="24" height="16" rx="2"/>
        <polyline points="-12,-2 0,8 12,-2"/>
        <line x1="0" y1="-8" x2="0" y2="-14" stroke="#0D9488" stroke-width="2"/>
        <polyline points="-3,-11 0,-14 3,-11" stroke="#0D9488" stroke-width="2"/>
      </g>

      <text x="60" y="148" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">HTTP req</text>
      <text x="60" y="166" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.5">10-30 ms</text>
    </g>

    <!-- Step 5 - BOTTLENECK / WIDER -->
    <g transform="translate(520, -10)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="170" height="210" rx="14" fill="url(#bottleneck)" stroke="#BE123C" stroke-width="2"/>
      <text x="20" y="36" font-size="11" font-weight="700" fill="#BE123C" letter-spacing="2">05  ·  COLLO BOTTIGLIA</text>

      <!-- Icon: gear -->
      <g transform="translate(85, 100)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="0" cy="0" r="11"/>
        <circle cx="0" cy="0" r="4" fill="#BE123C" stroke="none"/>
        <line x1="0" y1="-15" x2="0" y2="-19"/>
        <line x1="0" y1="15" x2="0" y2="19"/>
        <line x1="-15" y1="0" x2="-19" y2="0"/>
        <line x1="15" y1="0" x2="19" y2="0"/>
        <line x1="-11" y1="-11" x2="-14" y2="-14"/>
        <line x1="11" y1="11" x2="14" y2="14"/>
        <line x1="-11" y1="11" x2="-14" y2="14"/>
        <line x1="11" y1="-11" x2="14" y2="-14"/>
      </g>

      <text x="85" y="160" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Server processa</text>
      <text x="85" y="178" font-size="11" fill="#6B7280" text-anchor="middle">codice + DB + API</text>
      <text x="85" y="198" font-size="14" font-weight="700" fill="#BE123C" text-anchor="middle" letter-spacing="0.5">5-2000 ms</text>
    </g>

    <!-- Step 6 -->
    <g transform="translate(700, 0)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="120" height="190" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="14" y="32" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.3">06</text>
      <line x1="14" y1="42" x2="36" y2="42" stroke="#0F1419" stroke-width="2"/>

      <!-- Icon: down arrow envelope -->
      <g transform="translate(60, 90)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-12" y="-2" width="24" height="16" rx="2"/>
        <polyline points="-12,-2 0,8 12,-2"/>
        <line x1="0" y1="-14" x2="0" y2="-8" stroke="#0D9488" stroke-width="2"/>
        <polyline points="-3,-11 0,-8 3,-11" stroke="#0D9488" stroke-width="2"/>
      </g>

      <text x="60" y="148" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">HTTP res</text>
      <text x="60" y="166" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.5">10-50 ms</text>
    </g>

    <!-- Step 7 -->
    <g transform="translate(830, 0)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="120" height="190" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="14" y="32" font-size="14" font-weight="700" fill="#0F1419" letter-spacing="-0.3">07</text>
      <line x1="14" y1="42" x2="36" y2="42" stroke="#0F1419" stroke-width="2"/>

      <!-- Icon: paint brush -->
      <g transform="translate(60, 90)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-10" y="-12" width="20" height="10" rx="1.5"/>
        <line x1="-10" y1="-2" x2="10" y2="-2"/>
        <path d="M -7,0 L -7,8 Q -7,12 0,12 Q 7,12 7,8 L 7,0"/>
        <line x1="-3" y1="-9" x2="-3" y2="-5" stroke="#D97706" stroke-width="2"/>
        <line x1="3" y1="-9" x2="3" y2="-5" stroke="#D97706" stroke-width="2"/>
      </g>

      <text x="60" y="148" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">Render</text>
      <text x="60" y="166" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.5">100-1000 ms</text>
    </g>

    <!-- Step 8 -->
    <g transform="translate(960, 0)" filter="url(#soft-shadow-6)">
      <rect x="0" y="0" width="120" height="190" rx="14" fill="#FFFFFF" stroke="#0D9488" stroke-width="2"/>
      <text x="14" y="32" font-size="14" font-weight="700" fill="#0D9488" letter-spacing="-0.3">08</text>
      <line x1="14" y1="42" x2="36" y2="42" stroke="#0D9488" stroke-width="2"/>

      <!-- Icon: eye -->
      <g transform="translate(60, 90)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M -16,0 Q -8,-10 0,-10 Q 8,-10 16,0 Q 8,10 0,10 Q -8,10 -16,0 Z"/>
        <circle cx="0" cy="0" r="4" fill="#0D9488" stroke="none"/>
      </g>

      <text x="60" y="148" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">Vede!</text>
      <text x="60" y="166" font-size="11" font-weight="600" fill="#0D9488" text-anchor="middle" letter-spacing="0.5">~800 ms</text>
    </g>

  </g>

  <!-- Timeline indicator -->
  <g transform="translate(80, 460)">
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#0F1419" stroke-width="1.5"/>
    <text x="0" y="22" font-size="11" fill="#6B7280" letter-spacing="1">0 ms</text>
    <text x="1040" y="22" font-size="11" fill="#6B7280" text-anchor="end" letter-spacing="1">~800 ms</text>

    <!-- Tick marks -->
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#0F1419"/>
    <line x1="260" y1="-4" x2="260" y2="4" stroke="#0F1419"/>
    <line x1="520" y1="-4" x2="520" y2="4" stroke="#0F1419"/>
    <line x1="780" y1="-4" x2="780" y2="4" stroke="#0F1419"/>
    <line x1="1040" y1="-4" x2="1040" y2="4" stroke="#0F1419"/>

    <text x="260" y="22" font-size="11" fill="#9CA3AF" text-anchor="middle">200 ms</text>
    <text x="520" y="22" font-size="11" fill="#9CA3AF" text-anchor="middle">400 ms</text>
    <text x="780" y="22" font-size="11" fill="#9CA3AF" text-anchor="middle">600 ms</text>
  </g>

  <!-- Diagnostic call-out -->
  <g transform="translate(80, 530)" filter="url(#soft-shadow-6)">
    <rect x="0" y="0" width="1040" height="200" rx="16" fill="#0F1419"/>
    <text x="32" y="40" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">PER LA DIAGNOSI DELLA LENTEZZA</text>
    <text x="32" y="78" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">"Il sito è lento" non è una diagnosi.</text>

    <text x="32" y="120" font-size="15" fill="#FFFFFF" letter-spacing="-0.2">
      <tspan fill="#94A3B8">"</tspan>
      <tspan fill="#5EEAD4">Time-to-first-byte di 1.8 secondi</tspan>
      <tspan fill="#94A3B8">,</tspan>
      <tspan> il rallentamento è al </tspan>
      <tspan fill="#FBBF24" font-weight="700">passo 5 (server processa)</tspan>
      <tspan fill="#94A3B8">"</tspan>
      <tspan> — </tspan>
      <tspan font-style="italic" fill="#FFFFFF">questa</tspan>
      <tspan> è una diagnosi.</tspan>
    </text>

    <text x="32" y="158" font-size="13" fill="#9CA3AF" letter-spacing="-0.1">
      Conoscere gli 8 passi ti permette di capire <tspan fill="#FFFFFF">dove</tspan> guardare. L'80% dei rallentamenti è al passo 5: query DB lente, codice non ottimizzato, API esterne sincrone.
    </text>
  </g>

  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  06/16</text>
</svg>
