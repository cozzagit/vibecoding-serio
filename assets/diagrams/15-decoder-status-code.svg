<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-15" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg15)"/>

  <!-- HEADER -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 5  ·  INFOGRAFICA 15</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Decoder degli status code HTTP</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Quando il server ti grida un numero, sappi cosa ti sta dicendo.</text>

  <!-- CONTENUTO y>=200 -->

  <g transform="translate(80, 215)">

    <!-- 2xx — SUCCESS -->
    <g filter="url(#soft-shadow-15)">
      <rect x="0" y="0" width="500" height="240" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
      <rect x="0" y="0" width="500" height="50" rx="14" fill="#0D9488"/>
      <rect x="0" y="30" width="500" height="20" fill="#0D9488"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="2">2xx  ·  SUCCESSO</text>
      <text x="480" y="32" font-size="12" fill="#A7F3D0" text-anchor="end">colpa: nessuno</text>

      <g font-size="14">
        <rect x="20" y="68" width="60" height="28" rx="6" fill="#0D9488"/>
        <text x="50" y="86" font-weight="700" fill="#FFFFFF" text-anchor="middle">200</text>
        <text x="100" y="86" font-weight="700" fill="#0F1419">OK</text>
        <text x="170" y="86" fill="#6B7280" font-size="13">— GET, PATCH, PUT andati a buon fine</text>

        <rect x="20" y="106" width="60" height="28" rx="6" fill="#0D9488"/>
        <text x="50" y="124" font-weight="700" fill="#FFFFFF" text-anchor="middle">201</text>
        <text x="100" y="124" font-weight="700" fill="#0F1419">Created</text>
        <text x="190" y="124" fill="#6B7280" font-size="13">— POST, oggetto creato</text>

        <rect x="20" y="144" width="60" height="28" rx="6" fill="#0D9488"/>
        <text x="50" y="162" font-weight="700" fill="#FFFFFF" text-anchor="middle">204</text>
        <text x="100" y="162" font-weight="700" fill="#0F1419">No Content</text>
        <text x="220" y="162" fill="#6B7280" font-size="13">— DELETE, niente da ritornare</text>

        <rect x="20" y="186" width="60" height="28" rx="6" fill="#0D9488"/>
        <text x="50" y="204" font-weight="700" fill="#FFFFFF" text-anchor="middle">2xx</text>
        <text x="100" y="204" fill="#6B7280" font-size="13">In generale: tutto ok, vai avanti.</text>
      </g>
    </g>

    <!-- 3xx — REDIRECT -->
    <g transform="translate(540, 0)" filter="url(#soft-shadow-15)">
      <rect x="0" y="0" width="500" height="240" rx="14" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
      <rect x="0" y="0" width="500" height="50" rx="14" fill="#D97706"/>
      <rect x="0" y="30" width="500" height="20" fill="#D97706"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="2">3xx  ·  REDIRECT</text>
      <text x="480" y="32" font-size="12" fill="#FED7AA" text-anchor="end">"vai altrove"</text>

      <g font-size="14">
        <rect x="20" y="68" width="60" height="28" rx="6" fill="#D97706"/>
        <text x="50" y="86" font-weight="700" fill="#FFFFFF" text-anchor="middle">301</text>
        <text x="100" y="86" font-weight="700" fill="#0F1419">Moved Permanently</text>
        <text x="285" y="86" fill="#6B7280" font-size="13">— spostato per sempre</text>

        <rect x="20" y="106" width="60" height="28" rx="6" fill="#D97706"/>
        <text x="50" y="124" font-weight="700" fill="#FFFFFF" text-anchor="middle">302</text>
        <text x="100" y="124" font-weight="700" fill="#0F1419">Found</text>
        <text x="170" y="124" fill="#6B7280" font-size="13">— spostato temporaneamente</text>

        <rect x="20" y="144" width="60" height="28" rx="6" fill="#D97706"/>
        <text x="50" y="162" font-weight="700" fill="#FFFFFF" text-anchor="middle">304</text>
        <text x="100" y="162" font-weight="700" fill="#0F1419">Not Modified</text>
        <text x="232" y="162" fill="#6B7280" font-size="13">— hai già la cache giusta</text>

        <rect x="20" y="186" width="60" height="28" rx="6" fill="#D97706"/>
        <text x="50" y="204" font-weight="700" fill="#FFFFFF" text-anchor="middle">3xx</text>
        <text x="100" y="204" fill="#6B7280" font-size="13">In generale: il browser segue, non un errore.</text>
      </g>
    </g>

    <!-- 4xx — CLIENT ERROR -->
    <g transform="translate(0, 260)" filter="url(#soft-shadow-15)">
      <rect x="0" y="0" width="500" height="280" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
      <rect x="0" y="0" width="500" height="50" rx="14" fill="#EA580C"/>
      <rect x="0" y="30" width="500" height="20" fill="#EA580C"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="2">4xx  ·  ERRORE CLIENT</text>
      <text x="480" y="32" font-size="12" fill="#FED7AA" text-anchor="end">colpa: tua</text>

      <g font-size="14">
        <rect x="20" y="68" width="60" height="28" rx="6" fill="#EA580C"/>
        <text x="50" y="86" font-weight="700" fill="#FFFFFF" text-anchor="middle">400</text>
        <text x="100" y="86" font-weight="700" fill="#0F1419">Bad Request</text>
        <text x="218" y="86" fill="#6B7280" font-size="13">— richiesta malformata</text>

        <rect x="20" y="102" width="60" height="28" rx="6" fill="#EA580C"/>
        <text x="50" y="120" font-weight="700" fill="#FFFFFF" text-anchor="middle">401</text>
        <text x="100" y="120" font-weight="700" fill="#0F1419">Unauthorized</text>
        <text x="225" y="120" fill="#6B7280" font-size="13">— non autenticato</text>

        <rect x="20" y="136" width="60" height="28" rx="6" fill="#EA580C"/>
        <text x="50" y="154" font-weight="700" fill="#FFFFFF" text-anchor="middle">403</text>
        <text x="100" y="154" font-weight="700" fill="#0F1419">Forbidden</text>
        <text x="195" y="154" fill="#6B7280" font-size="13">— autenticato ma senza permessi</text>

        <rect x="20" y="170" width="60" height="28" rx="6" fill="#EA580C"/>
        <text x="50" y="188" font-weight="700" fill="#FFFFFF" text-anchor="middle">404</text>
        <text x="100" y="188" font-weight="700" fill="#0F1419">Not Found</text>
        <text x="195" y="188" fill="#6B7280" font-size="13">— rotta o risorsa non esiste</text>

        <rect x="20" y="204" width="60" height="28" rx="6" fill="#EA580C"/>
        <text x="50" y="222" font-weight="700" fill="#FFFFFF" text-anchor="middle">422</text>
        <text x="100" y="222" font-weight="700" fill="#0F1419">Unprocessable</text>
        <text x="232" y="222" fill="#6B7280" font-size="13">— validazione fallita</text>

        <rect x="20" y="238" width="60" height="28" rx="6" fill="#EA580C"/>
        <text x="50" y="256" font-weight="700" fill="#FFFFFF" text-anchor="middle">429</text>
        <text x="100" y="256" font-weight="700" fill="#0F1419">Too Many</text>
        <text x="190" y="256" fill="#6B7280" font-size="13">— rate limit superato, rallenta</text>
      </g>
    </g>

    <!-- 5xx — SERVER ERROR -->
    <g transform="translate(540, 260)" filter="url(#soft-shadow-15)">
      <rect x="0" y="0" width="500" height="280" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
      <rect x="0" y="0" width="500" height="50" rx="14" fill="#BE123C"/>
      <rect x="0" y="30" width="500" height="20" fill="#BE123C"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="2">5xx  ·  ERRORE SERVER</text>
      <text x="480" y="32" font-size="12" fill="#FECACA" text-anchor="end">colpa: server</text>

      <g font-size="14">
        <rect x="20" y="68" width="60" height="28" rx="6" fill="#BE123C"/>
        <text x="50" y="86" font-weight="700" fill="#FFFFFF" text-anchor="middle">500</text>
        <text x="100" y="86" font-weight="700" fill="#0F1419">Internal Error</text>
        <text x="232" y="86" fill="#6B7280" font-size="13">— bug nel codice, qualcosa è esploso</text>

        <rect x="20" y="106" width="60" height="28" rx="6" fill="#BE123C"/>
        <text x="50" y="124" font-weight="700" fill="#FFFFFF" text-anchor="middle">502</text>
        <text x="100" y="124" font-weight="700" fill="#0F1419">Bad Gateway</text>
        <text x="225" y="124" fill="#6B7280" font-size="13">— nginx non raggiunge backend</text>

        <rect x="20" y="144" width="60" height="28" rx="6" fill="#BE123C"/>
        <text x="50" y="162" font-weight="700" fill="#FFFFFF" text-anchor="middle">503</text>
        <text x="100" y="162" font-weight="700" fill="#0F1419">Unavailable</text>
        <text x="220" y="162" fill="#6B7280" font-size="13">— server giù o sovraccarico</text>

        <rect x="20" y="182" width="60" height="28" rx="6" fill="#BE123C"/>
        <text x="50" y="200" font-weight="700" fill="#FFFFFF" text-anchor="middle">504</text>
        <text x="100" y="200" font-weight="700" fill="#0F1419">Gateway Timeout</text>
        <text x="262" y="200" fill="#6B7280" font-size="13">— backend troppo lento</text>

        <rect x="20" y="226" width="460" height="40" rx="6" fill="#FFFFFF" stroke="#FCA5A5"/>
        <text x="32" y="250" font-size="12" fill="#7F1D1D">⚠ Quando vedi 5xx: non è colpa del prompt, è infrastruttura.</text>
      </g>
    </g>

  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  15/16</text>
</svg>
