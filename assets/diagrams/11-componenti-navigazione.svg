<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-11" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg11)"/>

  <!-- HEADER -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 3  ·  INFOGRAFICA 11</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Componenti di navigazione</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">Sette modi di muoversi in un sito — ognuno col nome giusto da usare nel prompt.</text>

  <!-- CONTENUTO y>=200 -->

  <!-- Grid 4x2 of components -->
  <g transform="translate(80, 215)">

    <!-- 1. NAVBAR -->
    <g filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">01  ·  NAVBAR</text>
      <!-- Sample mockup -->
      <rect x="20" y="50" width="210" height="34" rx="6" fill="#F3F4F6"/>
      <rect x="30" y="63" width="32" height="8" rx="2" fill="#2563EB"/>
      <rect x="80" y="63" width="22" height="8" rx="2" fill="#9CA3AF"/>
      <rect x="108" y="63" width="22" height="8" rx="2" fill="#9CA3AF"/>
      <rect x="136" y="63" width="22" height="8" rx="2" fill="#9CA3AF"/>
      <rect x="190" y="59" width="34" height="16" rx="3" fill="#2563EB"/>

      <text x="20" y="118" font-size="13" fill="#0F1419"><tspan font-weight="700">Barra orizzontale</tspan> in alto.</text>
      <text x="20" y="138" font-size="13" fill="#0F1419">Logo + link + CTA.</text>

      <text x="20" y="172" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
      <text x="20" y="192" font-size="12" fill="#6B7280">Sito vetrina, e-commerce, blog</text>
    </g>

    <!-- 2. SIDEBAR NAV -->
    <g transform="translate(270, 0)" filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">02  ·  SIDEBAR NAV</text>
      <!-- Sample mockup: vertical bar -->
      <rect x="20" y="50" width="60" height="80" rx="4" fill="#F3F4F6"/>
      <rect x="28" y="58" width="44" height="6" rx="1" fill="#2563EB"/>
      <rect x="28" y="72" width="38" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="28" y="86" width="44" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="28" y="100" width="36" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="28" y="114" width="40" height="6" rx="1" fill="#9CA3AF"/>
      <rect x="90" y="50" width="140" height="80" rx="4" fill="#F9FAFB"/>

      <text x="20" y="158" font-size="13" fill="#0F1419"><tspan font-weight="700">Colonna verticale</tspan> con</text>
      <text x="20" y="174" font-size="13" fill="#0F1419">icone + label.</text>

      <text x="20" y="200" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
      <text x="20" y="216" font-size="12" fill="#6B7280">Dashboard, app SaaS</text>
    </g>

    <!-- 3. BREADCRUMB -->
    <g transform="translate(540, 0)" filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">03  ·  BREADCRUMB</text>
      <!-- Sample: Home > Cat > Page -->
      <text x="20" y="80" font-size="14" font-family="'JetBrains Mono', monospace" fill="#9CA3AF">Home</text>
      <text x="68" y="80" font-size="14" font-family="'JetBrains Mono', monospace" fill="#D1D5DB">›</text>
      <text x="84" y="80" font-size="14" font-family="'JetBrains Mono', monospace" fill="#9CA3AF">Cat</text>
      <text x="120" y="80" font-size="14" font-family="'JetBrains Mono', monospace" fill="#D1D5DB">›</text>
      <text x="136" y="80" font-size="14" font-family="'JetBrains Mono', monospace" fill="#0F1419" font-weight="700">Pagina</text>

      <text x="20" y="125" font-size="13" fill="#0F1419">"Sei qui": traccia di</text>
      <text x="20" y="143" font-size="13" fill="#0F1419"><tspan font-weight="700">posizione</tspan> nella gerarchia.</text>

      <text x="20" y="178" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
      <text x="20" y="196" font-size="12" fill="#6B7280">Pagine annidate, e-commerce</text>
    </g>

    <!-- 4. TAB -->
    <g transform="translate(810, 0)" filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">04  ·  TAB</text>
      <!-- Sample: 3 tabs -->
      <line x1="20" y1="80" x2="230" y2="80" stroke="#E5E7EB"/>
      <text x="40" y="72" font-size="13" font-weight="700" fill="#2563EB">Info</text>
      <line x1="32" y1="82" x2="68" y2="82" stroke="#2563EB" stroke-width="2"/>
      <text x="100" y="72" font-size="13" fill="#9CA3AF">Foto</text>
      <text x="160" y="72" font-size="13" fill="#9CA3AF">Recensioni</text>

      <text x="20" y="125" font-size="13" fill="#0F1419"><tspan font-weight="700">Linguette</tspan> per cambiare</text>
      <text x="20" y="143" font-size="13" fill="#0F1419">contenuto stessa pagina.</text>

      <text x="20" y="178" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
      <text x="20" y="196" font-size="12" fill="#6B7280">Schede prodotto, settings</text>
    </g>

    <!-- 5. STEPPER -->
    <g transform="translate(0, 245)" filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">05  ·  STEPPER</text>
      <!-- Sample stepper: 4 dots -->
      <circle cx="40" cy="80" r="11" fill="#0D9488"/>
      <text x="40" y="84" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
      <line x1="51" y1="80" x2="89" y2="80" stroke="#0D9488" stroke-width="2"/>
      <circle cx="100" cy="80" r="11" fill="#0D9488"/>
      <text x="100" y="84" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
      <line x1="111" y1="80" x2="149" y2="80" stroke="#2563EB" stroke-width="2"/>
      <circle cx="160" cy="80" r="11" fill="#2563EB"/>
      <text x="160" y="84" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
      <line x1="171" y1="80" x2="209" y2="80" stroke="#E5E7EB" stroke-width="2"/>
      <circle cx="220" cy="80" r="11" fill="#E5E7EB"/>
      <text x="220" y="84" font-size="11" font-weight="700" fill="#9CA3AF" text-anchor="middle">4</text>

      <text x="20" y="125" font-size="13" fill="#0F1419">A che <tspan font-weight="700">punto sei</tspan> in un</text>
      <text x="20" y="143" font-size="13" fill="#0F1419">processo multi-step.</text>

      <text x="20" y="178" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
      <text x="20" y="196" font-size="12" fill="#6B7280">Checkout, onboarding</text>
    </g>

    <!-- 6. PAGINATION -->
    <g transform="translate(270, 245)" filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">06  ·  PAGINATION</text>
      <!-- Sample pagination -->
      <rect x="35" y="65" width="28" height="28" rx="4" fill="#F3F4F6"/>
      <text x="49" y="84" font-size="13" fill="#9CA3AF" text-anchor="middle">‹</text>
      <rect x="68" y="65" width="28" height="28" rx="4" fill="#0F1419"/>
      <text x="82" y="84" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="700">1</text>
      <rect x="101" y="65" width="28" height="28" rx="4" fill="#F3F4F6"/>
      <text x="115" y="84" font-size="13" fill="#0F1419" text-anchor="middle">2</text>
      <rect x="134" y="65" width="28" height="28" rx="4" fill="#F3F4F6"/>
      <text x="148" y="84" font-size="13" fill="#0F1419" text-anchor="middle">3</text>
      <text x="180" y="84" font-size="13" fill="#9CA3AF" text-anchor="middle">…</text>
      <rect x="195" y="65" width="28" height="28" rx="4" fill="#F3F4F6"/>
      <text x="209" y="84" font-size="13" fill="#9CA3AF" text-anchor="middle">›</text>

      <text x="20" y="125" font-size="13" fill="#0F1419"><tspan font-weight="700">Sfoglia</tspan> liste lunghe</text>
      <text x="20" y="143" font-size="13" fill="#0F1419">a blocchi.</text>

      <text x="20" y="178" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
      <text x="20" y="196" font-size="12" fill="#6B7280">Lista risultati lunga</text>
    </g>

    <!-- 7. HAMBURGER -->
    <g transform="translate(540, 245)" filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">07  ·  HAMBURGER</text>
      <!-- Sample: hamburger icon -->
      <rect x="40" y="55" width="50" height="50" rx="6" fill="#F3F4F6"/>
      <line x1="52" y1="68" x2="78" y2="68" stroke="#0F1419" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="52" y1="80" x2="78" y2="80" stroke="#0F1419" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="52" y1="92" x2="78" y2="92" stroke="#0F1419" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Drawer hint -->
      <rect x="110" y="55" width="120" height="50" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-dasharray="3 2"/>
      <line x1="118" y1="65" x2="180" y2="65" stroke="#9CA3AF" stroke-width="2"/>
      <line x1="118" y1="78" x2="170" y2="78" stroke="#9CA3AF" stroke-width="2"/>
      <line x1="118" y1="91" x2="195" y2="91" stroke="#9CA3AF" stroke-width="2"/>

      <text x="20" y="125" font-size="13" fill="#0F1419"><tspan font-weight="700">Icona ☰ mobile</tspan> che apre</text>
      <text x="20" y="143" font-size="13" fill="#0F1419">un drawer di navigazione.</text>

      <text x="20" y="178" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
      <text x="20" y="196" font-size="12" fill="#6B7280">Sempre, su mobile</text>
    </g>

    <!-- 8. ANCHOR LINK -->
    <g transform="translate(810, 245)" filter="url(#soft-shadow-11)">
      <rect x="0" y="0" width="250" height="220" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">08  ·  ANCHOR LINK</text>
      <text x="20" y="80" font-size="14" font-family="'JetBrains Mono', monospace" fill="#2563EB">#sezione</text>

      <line x1="20" y1="95" x2="230" y2="95" stroke="#E5E7EB"/>
      <rect x="20" y="105" width="120" height="6" rx="1" fill="#2563EB"/>
      <rect x="20" y="118" width="100" height="4" rx="1" fill="#9CA3AF"/>
      <rect x="20" y="128" width="80" height="4" rx="1" fill="#9CA3AF"/>

      <text x="20" y="160" font-size="13" fill="#0F1419"><tspan font-weight="700">Link interno</tspan> alla pagina</text>
      <text x="20" y="178" font-size="13" fill="#0F1419">via id (#sezione).</text>

      <text x="20" y="206" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">USA QUANDO</text>
    </g>

  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  11/16</text>
</svg>
