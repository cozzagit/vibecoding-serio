<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <linearGradient id="bridge-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="soft-shadow-8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg8)"/>

  <!-- HEADER -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 2  ·  INFOGRAFICA 08</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">Quali linguaggi vivono dove</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">La mappa di riferimento — quando senti un nome, è frontend o backend?</text>

  <!-- CONTENUTO y>=200 -->

  <!-- 3 column structure -->

  <!-- COLUMN 1: CLIENT -->
  <g transform="translate(80, 220)" filter="url(#soft-shadow-8)">
    <rect x="0" y="0" width="350" height="500" rx="20" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="24" y="40" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">CLIENT  ·  GIRA NEL BROWSER</text>
    <text x="24" y="76" font-size="22" font-weight="700" fill="#0F1419" letter-spacing="-0.5">Frontend</text>

    <line x1="24" y1="100" x2="326" y2="100" stroke="#E5E7EB"/>

    <!-- Tech list -->
    <g font-family="'JetBrains Mono', monospace">
      <text x="24" y="138" font-size="14" font-weight="700" fill="#0F1419">HTML</text>
      <text x="115" y="138" font-size="12" fill="#6B7280">struttura</text>

      <text x="24" y="170" font-size="14" font-weight="700" fill="#0F1419">CSS</text>
      <text x="115" y="170" font-size="12" fill="#6B7280">stile</text>

      <text x="24" y="202" font-size="14" font-weight="700" fill="#0F1419">Tailwind</text>
      <text x="115" y="202" font-size="12" fill="#6B7280">CSS in classi</text>
    </g>

    <line x1="24" y1="220" x2="326" y2="220" stroke="#F3F4F6"/>

    <text x="24" y="248" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">FRAMEWORK UI</text>

    <g font-family="'JetBrains Mono', monospace">
      <rect x="20" y="262" width="80" height="28" rx="6" fill="#EFF6FF"/>
      <text x="60" y="280" font-size="13" font-weight="600" fill="#2563EB" text-anchor="middle">React</text>
      <rect x="106" y="262" width="60" height="28" rx="6" fill="#F3F4F6"/>
      <text x="136" y="280" font-size="13" font-weight="600" fill="#6B7280" text-anchor="middle">Vue</text>
      <rect x="172" y="262" width="80" height="28" rx="6" fill="#F3F4F6"/>
      <text x="212" y="280" font-size="13" font-weight="600" fill="#6B7280" text-anchor="middle">Svelte</text>
      <rect x="258" y="262" width="80" height="28" rx="6" fill="#F3F4F6"/>
      <text x="298" y="280" font-size="13" font-weight="600" fill="#6B7280" text-anchor="middle">Angular</text>
    </g>

    <text x="24" y="316" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">CARTA D'IDENTITÀ DEL PROGETTO</text>

    <g font-family="'JetBrains Mono', monospace">
      <rect x="20" y="328" width="306" height="32" rx="6" fill="#0F1419"/>
      <text x="36" y="349" font-size="12" fill="#FBBF24">package.json</text>
      <text x="190" y="349" font-size="11" fill="#9CA3AF">→ JS / TS</text>
    </g>

    <line x1="24" y1="380" x2="326" y2="380" stroke="#F3F4F6"/>

    <text x="24" y="408" font-size="13" font-weight="600" fill="#0F1419">Cosa fa</text>
    <text x="24" y="430" font-size="12" fill="#6B7280">Mostra cose all'utente</text>
    <text x="24" y="448" font-size="12" fill="#6B7280">Riceve click e digitazioni</text>
    <text x="24" y="466" font-size="12" fill="#6B7280">Manda richieste al server</text>
  </g>

  <!-- COLUMN 2: BRIDGE (full-stack) -->
  <g transform="translate(450, 220)" filter="url(#soft-shadow-8)">
    <rect x="0" y="0" width="300" height="500" rx="20" fill="url(#bridge-fade)" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="24" y="40" font-size="11" font-weight="700" fill="#D97706" letter-spacing="2">PONTE  ·  GIRA OVUNQUE</text>
    <text x="24" y="76" font-size="22" font-weight="700" fill="#0F1419" letter-spacing="-0.5">Full-stack</text>

    <line x1="24" y1="100" x2="276" y2="100" stroke="#FCD34D" opacity="0.5"/>

    <text x="150" y="148" font-size="40" font-weight="800" fill="#0F1419" text-anchor="middle" font-family="'JetBrains Mono', monospace" letter-spacing="-1">JavaScript</text>
    <text x="150" y="180" font-size="40" font-weight="800" fill="#D97706" text-anchor="middle" font-family="'JetBrains Mono', monospace" letter-spacing="-1">TypeScript</text>

    <line x1="24" y1="210" x2="276" y2="210" stroke="#FCD34D" opacity="0.5"/>

    <text x="150" y="240" font-size="13" fill="#0F1419" text-anchor="middle">Stesso linguaggio,</text>
    <text x="150" y="258" font-size="13" fill="#0F1419" text-anchor="middle">due ambienti.</text>

    <text x="150" y="298" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="1">META-FRAMEWORK</text>

    <g font-family="'JetBrains Mono', monospace">
      <rect x="60" y="312" width="180" height="32" rx="6" fill="#FFFFFF" stroke="#FCD34D"/>
      <text x="150" y="333" font-size="14" font-weight="700" fill="#D97706" text-anchor="middle">Next.js</text>

      <rect x="60" y="354" width="84" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="102" y="372" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle">Nuxt</text>

      <rect x="156" y="354" width="84" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="198" y="372" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">SvelteKit</text>

      <rect x="60" y="388" width="84" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="102" y="406" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle">Remix</text>

      <rect x="156" y="388" width="84" height="26" rx="5" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="198" y="406" font-size="12" font-weight="600" fill="#6B7280" text-anchor="middle">Astro</text>
    </g>

    <line x1="24" y1="430" x2="276" y2="430" stroke="#FCD34D" opacity="0.5"/>

    <text x="150" y="460" font-size="11" fill="#6B7280" text-anchor="middle" font-style="italic">Quando vedi 'use client' in un</text>
    <text x="150" y="476" font-size="11" fill="#6B7280" text-anchor="middle" font-style="italic">file Next.js, quel pezzo gira nel browser.</text>
  </g>

  <!-- COLUMN 3: SERVER -->
  <g transform="translate(770, 220)" filter="url(#soft-shadow-8)">
    <rect x="0" y="0" width="350" height="500" rx="20" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5"/>
    <text x="24" y="40" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">SERVER  ·  GIRA SUL SERVER</text>
    <text x="24" y="76" font-size="22" font-weight="700" fill="#0F1419" letter-spacing="-0.5">Backend</text>

    <line x1="24" y1="100" x2="326" y2="100" stroke="#E5E7EB"/>

    <text x="24" y="128" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">LINGUAGGI &amp; FRAMEWORK</text>

    <g font-family="'JetBrains Mono', monospace">
      <text x="24" y="160" font-size="14" font-weight="700" fill="#0F1419">Node.js</text>
      <text x="120" y="160" font-size="12" fill="#6B7280">+ Express · NestJS</text>

      <text x="24" y="190" font-size="14" font-weight="700" fill="#0F1419">PHP</text>
      <text x="120" y="190" font-size="12" fill="#6B7280">+ Laravel · Symfony</text>

      <text x="24" y="220" font-size="14" font-weight="700" fill="#0F1419">Python</text>
      <text x="120" y="220" font-size="12" fill="#6B7280">+ Django · FastAPI</text>

      <text x="24" y="250" font-size="14" font-weight="700" fill="#0F1419">Ruby</text>
      <text x="120" y="250" font-size="12" fill="#6B7280">+ Rails</text>

      <text x="24" y="280" font-size="14" font-weight="700" fill="#0F1419">Go</text>
      <text x="120" y="280" font-size="12" fill="#6B7280">microservizi performanti</text>

      <text x="24" y="310" font-size="14" font-weight="700" fill="#0F1419">Java · .NET</text>
      <text x="142" y="310" font-size="12" fill="#6B7280">enterprise</text>
    </g>

    <line x1="24" y1="332" x2="326" y2="332" stroke="#F3F4F6"/>

    <text x="24" y="360" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">CARTA D'IDENTITÀ DEL PROGETTO</text>

    <g font-family="'JetBrains Mono', monospace">
      <rect x="20" y="376" width="306" height="26" rx="5" fill="#0F1419"/>
      <text x="36" y="393" font-size="11" fill="#FBBF24">composer.json</text>
      <text x="220" y="393" font-size="11" fill="#9CA3AF">→ PHP</text>

      <rect x="20" y="408" width="306" height="26" rx="5" fill="#0F1419"/>
      <text x="36" y="425" font-size="11" fill="#FBBF24">requirements.txt</text>
      <text x="220" y="425" font-size="11" fill="#9CA3AF">→ Python</text>

      <rect x="20" y="440" width="306" height="26" rx="5" fill="#0F1419"/>
      <text x="36" y="457" font-size="11" fill="#FBBF24">Gemfile</text>
      <text x="220" y="457" font-size="11" fill="#9CA3AF">→ Ruby</text>
    </g>
  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  08/16</text>
</svg>
