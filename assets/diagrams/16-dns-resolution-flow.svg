<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <filter id="soft-shadow-16" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-16" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F1419"/>
    </marker>
    <marker id="arr-16-back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0D9488"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg16)"/>

  <!-- HEADER -->
  <text x="80" y="80" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="2">MODULO 7  ·  INFOGRAFICA 16</text>
  <text x="80" y="125" font-size="38" font-weight="700" fill="#0F1419" letter-spacing="-1.2">DNS resolution flow</text>
  <text x="80" y="160" font-size="17" fill="#6B7280" letter-spacing="-0.2">La catena di server che traduce <tspan font-family="'JetBrains Mono', monospace" fill="#0F1419">miosito.it</tspan> in <tspan font-family="'JetBrains Mono', monospace" fill="#0F1419">188.213.170.214</tspan>.</text>

  <!-- CONTENUTO y>=200 -->

  <g transform="translate(80, 215)">

    <!-- BROWSER -->
    <g transform="translate(0, 60)" filter="url(#soft-shadow-16)">
      <rect x="0" y="0" width="180" height="100" rx="14" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#2563EB" letter-spacing="2">01</text>
      <g transform="translate(90, 60)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-22" y="-14" width="44" height="28" rx="3"/>
        <line x1="-22" y1="-6" x2="22" y2="-6"/>
        <circle cx="-17" cy="-10" r="1.2" fill="#BE123C" stroke="none"/>
        <circle cx="-13" cy="-10" r="1.2" fill="#D97706" stroke="none"/>
        <circle cx="-9" cy="-10" r="1.2" fill="#0D9488" stroke="none"/>
      </g>
      <text x="90" y="92" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">Browser</text>
    </g>

    <!-- Step 1 question -->
    <line x1="180" y1="110" x2="320" y2="110" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr-16)"/>
    <rect x="200" y="92" width="100" height="22" rx="11" fill="#0F1419"/>
    <text x="250" y="107" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">"dov'è miosito.it?"</text>

    <!-- RESOLVER -->
    <g transform="translate(330, 60)" filter="url(#soft-shadow-16)">
      <rect x="0" y="0" width="200" height="100" rx="14" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#D97706" letter-spacing="2">02</text>
      <g transform="translate(100, 60)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-15" y="-12" width="30" height="9" rx="1.5"/>
        <rect x="-15" y="-1" width="30" height="9" rx="1.5"/>
        <circle cx="-10" cy="-7.5" r="0.8" fill="#D97706" stroke="none"/>
        <circle cx="-10" cy="3.5" r="0.8" fill="#D97706" stroke="none"/>
      </g>
      <text x="100" y="92" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">Resolver locale</text>
      <text x="100" y="106" font-size="10" fill="#6B7280" text-anchor="middle">(ISP / 8.8.8.8)</text>
    </g>

    <!-- Step 2 -->
    <line x1="530" y1="110" x2="650" y2="110" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr-16)"/>

    <!-- ROOT -->
    <g transform="translate(660, 60)" filter="url(#soft-shadow-16)">
      <rect x="0" y="0" width="180" height="100" rx="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#7C3AED" letter-spacing="2">03</text>
      <text x="90" y="62" font-size="22" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#7C3AED" text-anchor="middle">.</text>
      <text x="90" y="92" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">Root server</text>
      <text x="90" y="106" font-size="10" fill="#6B7280" text-anchor="middle">(13 cluster mondiali)</text>
    </g>

    <!-- Step 3 -->
    <line x1="840" y1="110" x2="960" y2="110" stroke="#0F1419" stroke-width="1.5" marker-end="url(#arr-16)"/>

    <!-- TLD -->
    <g transform="translate(970, 60)" filter="url(#soft-shadow-16)">
      <rect x="0" y="0" width="150" height="100" rx="14" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">04</text>
      <text x="75" y="62" font-size="20" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#0D9488" text-anchor="middle">.it</text>
      <text x="75" y="92" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">TLD server</text>
    </g>

    <!-- Wrap arrow down to second row -->
    <path d="M 1045,160 L 1045,210 L 90,210 L 90,250" stroke="#0F1419" stroke-width="1.5" fill="none" marker-end="url(#arr-16)" stroke-dasharray="4 3" opacity="0.5"/>
    <text x="600" y="200" font-size="11" fill="#9CA3AF" text-anchor="middle" font-style="italic">la catena continua...</text>

    <!-- AUTHORITATIVE -->
    <g transform="translate(0, 260)" filter="url(#soft-shadow-16)">
      <rect x="0" y="0" width="200" height="100" rx="14" fill="#FFFFFF" stroke="#BE123C" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#BE123C" letter-spacing="2">05</text>
      <g transform="translate(100, 60)" stroke="#0F1419" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-12" y="-12" width="24" height="20" rx="1"/>
        <line x1="-7" y1="-7" x2="7" y2="-7" stroke="#BE123C"/>
        <line x1="-7" y1="-3" x2="7" y2="-3" stroke="#BE123C"/>
        <line x1="-7" y1="1" x2="7" y2="1" stroke="#BE123C"/>
      </g>
      <text x="100" y="92" font-size="13" font-weight="700" fill="#0F1419" text-anchor="middle">Authoritative DNS</text>
      <text x="100" y="106" font-size="10" fill="#6B7280" text-anchor="middle">(name server di miosito.it)</text>
    </g>

    <!-- Result IP -->
    <line x1="200" y1="310" x2="370" y2="310" stroke="#0D9488" stroke-width="2" marker-end="url(#arr-16-back)"/>
    <rect x="220" y="292" width="130" height="26" rx="6" fill="#0D9488"/>
    <text x="285" y="310" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#FFFFFF" text-anchor="middle">188.213.170.214</text>

    <!-- Browser knows -->
    <g transform="translate(380, 260)" filter="url(#soft-shadow-16)">
      <rect x="0" y="0" width="200" height="100" rx="14" fill="#F0FDF4" stroke="#0D9488" stroke-width="1.5"/>
      <text x="20" y="32" font-size="11" font-weight="700" fill="#0D9488" letter-spacing="2">06  ·  IP RICEVUTO</text>
      <text x="100" y="62" font-size="14" fill="#0F1419" text-anchor="middle">Il browser ora sa</text>
      <text x="100" y="80" font-size="14" fill="#0F1419" text-anchor="middle">dove andare.</text>
      <text x="100" y="100" font-size="11" fill="#6B7280" text-anchor="middle">Apre connessione TCP/TLS.</text>
    </g>

  </g>

  <!-- TIMING TABLE -->
  <g transform="translate(80, 600)" filter="url(#soft-shadow-16)">
    <rect x="0" y="0" width="1040" height="140" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="32" y="36" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="2">TEMPI TIPICI  ·  L'ORDINE CONTA</text>

    <line x1="32" y1="56" x2="1008" y2="56" stroke="#E5E7EB"/>

    <g font-size="13">
      <text x="32" y="80" fill="#0F1419">Cache browser / OS (già visitato)</text>
      <text x="700" y="80" font-family="'JetBrains Mono', monospace" font-weight="600" fill="#0D9488">~ 0 ms</text>
      <text x="800" y="80" fill="#9CA3AF" font-size="11">(istantaneo)</text>

      <text x="32" y="103" fill="#0F1419">Resolver locale ha già la risposta in cache</text>
      <text x="700" y="103" font-family="'JetBrains Mono', monospace" font-weight="600" fill="#0D9488">10-30 ms</text>

      <text x="32" y="125" fill="#0F1419">Catena completa (root → TLD → authoritative)</text>
      <text x="700" y="125" font-family="'JetBrains Mono', monospace" font-weight="600" fill="#D97706">50-200 ms</text>
      <text x="800" y="125" fill="#9CA3AF" font-size="11">(prima visita)</text>
    </g>
  </g>

  <!-- FOOTER -->
  <text x="1120" y="788" font-size="11" fill="#D1D5DB" text-anchor="end" letter-spacing="1">VIBECODING SERIO  ·  16/16</text>
</svg>
